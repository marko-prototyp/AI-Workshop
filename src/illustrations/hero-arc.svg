    <circle class="arc-node" style="animation-delay:1.8s" cx="200" cy="280" r="3"   fill="#d97757"/>
    <text   class="arc-label" style="animation-delay:1.8s" x="210" y="284">05 — Bridge</text>

    <circle class="arc-node" style="animation-delay:2.2s" cx="280" cy="220" r="2.5" fill="#e8e2d8"/>
    <text   class="arc-label" style="animation-delay:2.2s" x="290" y="224">08</text>

    <circle class="arc-node" style="animation-delay:2.6s" cx="360" cy="80"  r="4"   fill="#d97757"/>
    <text   class="arc-label" style="animation-delay:2.6s" x="290" y="74">12 — Ship</text>
