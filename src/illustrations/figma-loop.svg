<svg viewBox="0 0 360 360" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <defs>
    <marker id="fl-arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polyline points="0,0.5 7,3 0,5.5" fill="none" stroke="#d97757" stroke-width="1.2" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Arcs (clockwise: Design → Export → Prompt → Build → Design) -->
  <path d="M 212 64 A 120 120 0 0 1 296 148" fill="none" stroke="#d97757" stroke-width="1.2" marker-end="url(#fl-arrow)"/>
  <path d="M 296 212 A 120 120 0 0 1 212 296" fill="none" stroke="#d97757" stroke-width="1.2" marker-end="url(#fl-arrow)"/>
  <path d="M 148 296 A 120 120 0 0 1 64 212" fill="none" stroke="#d97757" stroke-width="1.2" marker-end="url(#fl-arrow)"/>
  <path d="M 64 148 A 120 120 0 0 1 148 64" fill="none" stroke="#d97757" stroke-width="1.2" marker-end="url(#fl-arrow)"/>

  <!-- Nodes -->
  <circle cx="180" cy="60" r="30" fill="#1a1714" stroke="#d97757" stroke-width="1.2"/>
  <circle cx="300" cy="180" r="30" fill="#1a1714" stroke="#d97757" stroke-width="1.2"/>
  <circle cx="180" cy="300" r="30" fill="#1a1714" stroke="#d97757" stroke-width="1.2"/>
  <circle cx="60" cy="180" r="30" fill="#1a1714" stroke="#d97757" stroke-width="1.2"/>

  <!-- Node labels -->
  <text x="180" y="60" text-anchor="middle" dominant-baseline="middle" font-family="'JetBrains Mono', monospace" font-size="9" letter-spacing="1" fill="#e8e2d8">DESIGN</text>
  <text x="300" y="180" text-anchor="middle" dominant-baseline="middle" font-family="'JetBrains Mono', monospace" font-size="9" letter-spacing="1" fill="#e8e2d8">EXPORT</text>
  <text x="180" y="300" text-anchor="middle" dominant-baseline="middle" font-family="'JetBrains Mono', monospace" font-size="9" letter-spacing="1" fill="#e8e2d8">PROMPT</text>
  <text x="60" y="180" text-anchor="middle" dominant-baseline="middle" font-family="'JetBrains Mono', monospace" font-size="9" letter-spacing="1" fill="#e8e2d8">BUILD</text>

  <!-- Center label -->
  <text x="180" y="172" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="#6b6560">refine, repeat</text>
  <text x="180" y="188" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="#6b6560">per section</text>
</svg>
