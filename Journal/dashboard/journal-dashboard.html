function bindImagesTab(n) {
  const fileInput = document.getElementById('wd-img-input');
  const root = document.getElementById('img-tab-root');

  // File input (browse button)
  fileInput?.addEventListener('change', () => {
    if (fileInput.files.length) addWeekImages(n, fileInput.files, -1);
  });

  // Tile name / alt text editing
  document.querySelectorAll('[data-tile-img]').forEach(input => {
    input.addEventListener('mousedown', e => e.stopPropagation()); // don't start tile drag
    input.addEventListener('input', () => {
      const id = input.dataset.tileImg;
      const field = input.dataset.tileField;
      const imgs = getWeekImgs(n);
      const img = imgs.find(i => i.id === id);
      if (img) { img[field] = input.value; saveState(); }
    });
  });

  // Save images to Journal button
  document.getElementById('btn-save-images')?.addEventListener('click', () => saveImagesToJournal(n));

  // Whole-tab file drop — catch files dropped anywhere in the images tab
  if (root) {
    root.addEventListener('dragover', e => {
      if (e.dataTransfer.types.includes('Files')) {
        e.preventDefault();
        root.style.outline = '2px dashed var(--text)';
        root.style.outlineOffset = '4px';
      }
    });
    root.addEventListener('dragleave', e => {
      if (!root.contains(e.relatedTarget)) {
        root.style.outline = '';
        root.style.outlineOffset = '';
      }
    });
    root.addEventListener('drop', e => {
      root.style.outline = '';
      if (e.dataTransfer.files.length) {
        e.preventDefault();
        addWeekImages(n, e.dataTransfer.files, -1);
      }
    });
  }

  // Remove image
  document.querySelectorAll('[data-remove-img]').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      const id = el.dataset.removeImg;
      state.weekImages[n] = (state.weekImages[n] || []).filter(img => img.id !== id);
      saveState(); render();
    });
  });

  // Unplace image
  document.querySelectorAll('[data-unplace-img]').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      const id = el.dataset.unplaceImg;
      const imgs = getWeekImgs(n);
      const img = imgs.find(i => i.id === id);
      if (img) { img.afterBlock = -1; saveState(); render(); }
    });
  });

  // Internal drag from palette tiles
  let dragImgId = null;
  document.querySelectorAll('.img-tile[draggable]').forEach(tile => {
    tile.addEventListener('dragstart', e => {
      dragImgId = tile.dataset.imgId;
      tile.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', dragImgId); // needed for Firefox
    });
    tile.addEventListener('dragend', () => {
      dragImgId = null;
      document.querySelectorAll('.img-tile').forEach(t => t.classList.remove('dragging'));
    });
  });

  // Drop bars — handle BOTH file drops (upload + place) and tile repositioning
  document.querySelectorAll('[data-drop-block]').forEach(bar => {
    bar.addEventListener('dragover', e => {
      e.preventDefault();
      e.stopPropagation(); // prevent root handler showing outline
      bar.classList.add('drag-over');
    });
    bar.addEventListener('dragleave', e => {
      if (!bar.contains(e.relatedTarget)) bar.classList.remove('drag-over');
    });
    bar.addEventListener('drop', e => {
      e.preventDefault();
      e.stopPropagation();
      bar.classList.remove('drag-over');
      const blockIdx = parseInt(bar.dataset.dropBlock);

      if (e.dataTransfer.files.length) {
        // External file drop — upload AND place at this block
        addWeekImages(n, e.dataTransfer.files, blockIdx);
      } else if (dragImgId) {
        // Internal tile reposition
        const imgs = getWeekImgs(n);
        const img = imgs.find(i => i.id === dragImgId);
        if (img) { img.afterBlock = blockIdx; saveState(); render(); }
        dragImgId = null;
      }
    });
  });
}

function addWeekImages(n, files, afterBlock = -1) {
  let loaded = 0;
  const total = files.length;
  Array.from(files).forEach((file, idx) => {
    const reader = new FileReader();
    reader.onload = e => {
      const imgs = getWeekImgs(n);
      imgs.push({
        id: 'img-' + Date.now() + '-' + idx + '-' + Math.random().toString(36).slice(2,5),
        name: file.name,
        alt: file.name.replace(/\.[^.]+$/, '').replace(/[-_]/g, ' '),
        dataUrl: e.target.result,
        afterBlock: afterBlock
      });
      // Reset saved state when new files are added
      if (!state.imgSaved) state.imgSaved = {};
      state.imgSaved[n] = false;
      loaded++;
      if (loaded === total) { saveState(); render(); toast(`${total} file${total>1?'s':''} added.`); }
    };
    reader.onerror = () => { toast('Could not read ' + file.name); };
    reader.readAsDataURL(file);
  });
}

// ─── Journal Entry Edit Mode ─────────────────────────────────────────────────
function renderStagedImg(img) {
  const alt = img.alt || img.name;
  return '<figure class="journal-figure">' +
    '<img src="' + img.dataUrl + '" alt="' + escAttr(alt) +
      '" style="width:100%;display:block;max-height:400px;object-fit:contain;background:var(--faint)">' +
    '<figcaption>' + escHtml(alt) + ' <span style="opacity:.5;font-size:11px">(staged)</span></figcaption>' +
    '</figure>';
}

function renderJournalEntryTab(n, entry) {
  if (!entry) {
    return `<div class="empty-state">No published journal entry found for Week ${n}.<br>
      <span style="font-size:12px;color:var(--muted)">Expected at: content/journal/${String(n).padStart(2,'0')}.md</span></div>`;
  }
  const ed = getJournalEdit(n, entry);
  const isEdit = ed.mode === 'edit';

  const toolbarHtml = `<div class="je-toolbar">
    <div class="je-toolbar-left">
      ${isEdit
        ? `<button class="btn btn-secondary btn-sm" id="je-btn-preview">👁 Preview</button>`
        : `<button class="btn btn-secondary btn-sm" id="je-btn-edit">✏ Edit</button>`}
    </div>
    <div class="je-toolbar-right">
      ${ed.dirty ? '<span class="je-draft-note">● Unsaved changes</span>' : ''}
      ${isEdit ? `
        <button class="btn btn-primary btn-sm" id="je-btn-save">Save draft</button>
        <button class="btn btn-ghost btn-sm" id="je-btn-push">↑ Push to file</button>
      ` : ''}
    </div>
  </div>`;

  if (isEdit) {
    return `${toolbarHtml}
    <div class="write-section">
      <div class="section-label">Quote</div>
      <input class="je-input" id="je-quote" type="text" value="${escAttr(ed.quote)}" placeholder="The session quote that leads the entry…">
      <div class="mt8"></div>
      <div class="section-label" style="margin-top:12px">Quote attribution</div>
      <input class="je-input" id="je-attr" type="text" value="${escAttr(ed.quoteAttribution)}" placeholder="Who said it and why it matters…">
    </div>
    <div class="write-section">
      <div class="section-label">Journal body (markdown — figures show as placeholders in preview)</div>
      <textarea class="editor-area" id="je-body" style="min-height:500px;font-family:monospace;font-size:13px">${escAttr(ed.body)}</textarea>
    </div>`;
  } else {
    const quoteHtml = ed.quote ? `<div class="je-quote-block">
      <div class="je-quote-display">"${escHtml(ed.quote)}"</div>
      ${ed.quoteAttribution ? `<div class="je-quote-attr">— ${escHtml(ed.quoteAttribution)}</div>` : ''}
    </div>` : '';

    // Build preview with placed images interleaved at the right paragraph positions
    const weekImgs = state.weekImages[n] || [];
    let bodyHtml;
    if (weekImgs.length === 0) {
      bodyHtml = `<div class="prose">${renderMd(ed.body)}</div>`;
    } else {
      // Use the same source and split logic as the Images tab so afterBlock indices align exactly
      const rawEntry = FD.sessions[String(n)]?.entry || '';
      const splitSource = rawEntry || ed.body;
      const blocks = splitSource.replace(/^---[\s\S]*?---\n/, '').split(/\n{2,}/).map(b => b.trim()).filter(Boolean);
      const parts = [];
      // Images placed before all content (afterBlock === -1)
      weekImgs.filter(i => i.afterBlock === -1).forEach(img => parts.push(renderStagedImg(img)));
      // Each block followed by any images placed after it
      blocks.forEach((block, i) => {
        parts.push(`<div class="prose" style="margin-bottom:0">${renderMd(block)}</div>`);
        weekImgs.filter(im => im.afterBlock === i).forEach(img => parts.push(renderStagedImg(img)));
      });
      bodyHtml = '<div>' + parts.join('') + '</div>';
    }

    return `${toolbarHtml}${quoteHtml}${bodyHtml}`;
  }
}

function bindJournalEntry(n) {
  const entry = FD.sessions[String(n)]?.entry || '';
  const ed = getJournalEdit(n, entry);

  document.getElementById('je-btn-preview')?.addEventListener('click', () => {
    // Capture current values before switching
    const q = document.getElementById('je-quote');
    const a = document.getElementById('je-attr');
    const b = document.getElementById('je-body');
    if (q) ed.quote = q.value;
    if (a) ed.quoteAttribution = a.value;
    if (b) ed.body = b.value;
    ed.mode = 'preview';
    saveState();
    render();
  });

  document.getElementById('je-btn-edit')?.addEventListener('click', () => {
    ed.mode = 'edit';
    saveState();
    render();
  });

  // Autosave on every keystroke in edit mode
  ['je-quote','je-attr','je-body'].forEach(id => {
    document.getElementById(id)?.addEventListener('input', () => {
      const q = document.getElementById('je-quote');
      const a = document.getElementById('je-attr');
      const b = document.getElementById('je-body');
      if (q) ed.quote = q.value;
      if (a) ed.quoteAttribution = a.value;
      if (b) ed.body = b.value;
      ed.dirty = true;
      saveState();
    });
  });

  document.getElementById('je-btn-save')?.addEventListener('click', () => {
    const q = document.getElementById('je-quote');
    const a = document.getElementById('je-attr');
    const b = document.getElementById('je-body');
    if (q) ed.quote = q.value;
    if (a) ed.quoteAttribution = a.value;
    if (b) ed.body = b.value;
    ed.dirty = true;
    saveState();
    toast('✓ Draft saved to app.');
  });

  document.getElementById('je-btn-push')?.addEventListener('click', async () => {
    const q = document.getElementById('je-quote');
    const a = document.getElementById('je-attr');
    const b = document.getElementById('je-body');
    if (q) ed.quote = q.value;
    if (a) ed.quoteAttribution = a.value;
    if (b) ed.body = b.value;

    const numStr = String(n).padStart(2, '0');
    const origEntry = FD.sessions[String(n)]?.entry || '';
    let newEntry;
    const fmMatch = origEntry.match(/^(---\n)([\s\S]*?)(\n---\n)([\s\S]*)$/);
    if (fmMatch) {
      let fm = fmMatch[2];
      fm = fm.replace(/^quote:.*$/m, 'quote: "' + ed.quote.replace(/\\/g,'\\\\').replace(/"/g,'\\"') + '"');
      fm = fm.replace(/^quoteAttribution:.*$/m, 'quoteAttribution: "' + ed.quoteAttribution.replace(/\\/g,'\\\\').replace(/"/g,'\\"') + '"');
      newEntry = fmMatch[1] + fm + fmMatch[3] + ed.body;
    } else {
      newEntry = ed.body;
    }

    const pushBtn = document.getElementById('je-btn-push');
    if (pushBtn) { pushBtn.disabled = true; pushBtn.textContent = 'Saving…'; }
    const resetBtn = () => { if (pushBtn) { pushBtn.disabled = false; pushBtn.textContent = '↑ Push to file'; } };

    if (!localApiAvailable) { showNoApiModal(); resetBtn(); return; }
    try {
      const wr = await apiWriteText(`content/journal/${numStr}.md`, newEntry);
      if (!wr.ok) throw new Error(wr.error);
      ed.dirty = false;
      saveState();
      await apiGitCommit('Week ' + n + ': edit journal entry', [`content/journal/${numStr}.md`]);
      showCommitModal('Week ' + n + ' entry saved and committed');
    } catch(e) { toast('⚠ ' + e.message); }
    resetBtn();
  });
}

// ─── Write Entry ──────────────────────────────────────────────────────────────
const PARTICIPANT_NAMES = {"ivo":"Ivo (Wattlog)","ivan":"Ivan (Mockup Generator)","paula":"Paula (Classroom Tracker)","marin":"Marin (Naučimo Hrvatski)","marko":"Marko (AI for Designers)"};

function getDraft(n) {
  if (!state.writeDraft[n]) state.writeDraft[n] = { notes: '', angles: ['','',''], variations: [], selected: -1, editorContent: '', files: [] };
  return state.writeDraft[n];
}

function renderWriteEntry(n) {
  const week = WEEKS.find(w => w.n === n);
  const draft = getDraft(n);

  const anglesHtml = draft.angles.map((a, i) =>
    `<div class="angle-row">
      <div class="angle-num">${i+1}.</div>
      <textarea class="angle-input" rows="2" id="angle-${i}" placeholder="Editorial angle ${i+1}…">${escAttr(a)}</textarea>
    </div>`
  ).join('');

  const variationsHtml = draft.variations.length > 0 ? `
    <div class="write-section">
      <div class="write-label">Variations — select one to edit</div>
      <div class="variations-grid">
        ${draft.variations.map((v, i) => `
          <div class="var-card${draft.selected===i?' selected':''}" data-var="${i}">
            <div class="var-card-header">Angle ${i+1}</div>
            <div class="var-card-body">${escHtml(v)}</div>
          </div>`).join('')}
      </div>
      ${draft.selected >= 0 ? `
        <div class="write-label">Edit selected variation</div>
        <textarea class="editor-area" id="editor-area">${escAttr(draft.editorContent || draft.variations[draft.selected] || '')}</textarea>
        <div class="btn-row mt16">
          <button class="btn btn-primary" id="btn-review">Review &amp; publish →</button>
        </div>
      ` : ''}
    </div>` : '';

  return `<div class="view">
    <div class="back-btn" id="back-btn">← Back to Session Notes</div>
    <div class="view-title">Write Entry — Week ${n}</div>
    <div class="view-sub">${week.title} · ${week.date}</div>

    <div class="write-section">
      <div class="write-label">Session notes</div>
      <textarea class="write-notes" id="write-notes" placeholder="Paste notes here — markdown or plain text. Each paste accumulates.">${escAttr(draft.notes)}</textarea>
      <div style="color:var(--muted);font-size:12px;margin-top:4px;">Notes accumulate — paste again to add more.</div>
    </div>

    <div class="write-section">
      <div class="write-label">Files — images &amp; participant HTML</div>
      <div class="drop-zone" id="drop-zone">Drop images (PNG/JPG/GIF) or HTML files here, or click to browse<br><span style="font-size:11px;margin-top:4px;display:inline-block;">HTML files will preview in a sandbox below</span></div>
      <input type="file" id="file-input" style="display:none" multiple accept="image/*,.html">
      <div class="file-list" id="file-list"></div>
      <div id="html-previews"></div>
    </div>

    <div class="write-section">
      <div class="write-label">Editorial angles</div>
      <div id="angles-container">
        <div class="angles-list">${anglesHtml}</div>
        <div class="btn-row mt8">
          <button class="btn btn-secondary btn-sm" id="btn-suggest">✦ Suggest angles from notes</button>
          <button class="btn btn-primary" id="btn-generate">Generate variations →</button>
        </div>
      </div>
    </div>

    ${variationsHtml}

    <div id="review-section" style="display:none"></div>
  </div>`;
}

function escAttr(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function bindWriteEntry() {
  const n = state.writeWeek;
  const draft = getDraft(n);

  document.getElementById('back-btn')?.addEventListener('click', () => {
    state.writeWeek = null; render();
  });

  // Notes accumulate
  const notesEl = document.getElementById('write-notes');
  notesEl?.addEventListener('blur', () => {
    draft.notes = notesEl.value;
    saveState();
  });

  // File drop
  const dropZone = document.getElementById('drop-zone');
  const fileInput = document.getElementById('file-input');
  dropZone?.addEventListener('click', () => fileInput?.click());
  dropZone?.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone?.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone?.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('drag-over'); handleFiles(e.dataTransfer.files); });
  fileInput?.addEventListener('change', () => handleFiles(fileInput.files));

  // Angles
  document.querySelectorAll('.angle-input').forEach((el, i) => {
    el.addEventListener('input', () => { draft.angles[i] = el.value; saveState(); });
  });

  document.getElementById('btn-suggest')?.addEventListener('click', suggestAngles);
  document.getElementById('btn-generate')?.addEventListener('click', generateVariations);

  // Variation selection
  document.querySelectorAll('.var-card').forEach(card => {
    card.addEventListener('click', () => {
      draft.selected = parseInt(card.dataset.var);
      draft.editorContent = draft.variations[draft.selected];
      saveState();
      render();
    });
  });

  // Editor
  const editorEl = document.getElementById('editor-area');
  editorEl?.addEventListener('input', () => { draft.editorContent = editorEl.value; saveState(); });

  document.getElementById('btn-review')?.addEventListener('click', showReview);

  // Restore file chips
  renderFileChips();
}

function handleFiles(files) {
  const n = state.writeWeek;
  const draft = getDraft(n);
  Array.from(files).forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      const entry = { name: file.name, type: file.type, dataUrl: e.target.result };
      draft.files = draft.files || [];
      draft.files.push(entry);
      saveState();
      renderFileChips();
      if (file.name.endsWith('.html')) renderHtmlPreviews();
    };
    reader.readAsDataURL(file);
  });
}

function renderFileChips() {
  const n = state.writeWeek;
  const draft = getDraft(n);
  const list = document.getElementById('file-list');
  if (!list) return;
  list.innerHTML = (draft.files || []).map((f, i) =>
    `<div class="file-chip">${f.name} <span class="fc-remove" data-idx="${i}">✕</span></div>`
  ).join('');
  list.querySelectorAll('.fc-remove').forEach(btn => {
    btn.addEventListener('click', () => {
      draft.files.splice(parseInt(btn.dataset.idx), 1);
      saveState();
      renderFileChips();
      renderHtmlPreviews();
    });
  });
}

function renderHtmlPreviews() {
  const n = state.writeWeek;
  const draft = getDraft(n);
  const container = document.getElementById('html-previews');
  if (!container) return;
  const htmlFiles = (draft.files || []).filter(f => f.name.endsWith('.html'));
  container.innerHTML = htmlFiles.map(f => {
    // decode dataUrl to get src html
    const src = atob(f.dataUrl.split(',')[1]);
    return `<div class="file-preview">
      <div class="section-label" style="padding:8px 0 4px">${f.name}</div>
      <iframe sandbox="allow-scripts" srcdoc="${escAttr(src)}"></iframe>
    </div>`;
  }).join('');
}

async function suggestAngles() {
  const n = state.writeWeek;
  const draft = getDraft(n);
  if (!draft.notes.trim()) { toast('Paste some notes first.'); return; }
  const askClaude = getAskClaude();
  if (!askClaude) { toast('askClaude not available in this context.'); return; }
  const btn = document.getElementById('btn-suggest');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Suggesting…';
  try {
    const week = WEEKS.find(w => w.n === n);
    const result = await askClaude(
      `You are helping a facilitator write about their AI workshop session.
Given the following session notes for Week ${n} ("${week.title}"), suggest exactly 3 distinct editorial angles for writing the weekly synthesis.
Each angle should be a specific, concrete framing — not generic. Reference actual content from the notes.
Format your response as exactly 3 lines, each starting with a number: "1. [angle]", "2. [angle]", "3. [angle]".
Nothing else.`,
      [{ type: 'text', text: draft.notes }]
    );
    const lines = (result || '').split('\n').filter(l => /^\d\./.test(l.trim()));
    lines.forEach((l, i) => {
      if (i < 3) draft.angles[i] = l.replace(/^\d\.\s*/, '').trim();
    });
    saveState();
    render();
    toast('Angles suggested — edit them as needed.');
  } catch(e) {
    toast('Error suggesting angles: ' + e.message);
  } finally {
    if (btn) { btn.disabled = false; btn.innerHTML = '✦ Suggest angles from notes'; }
  }
}

async function generateVariations() {
  const n = state.writeWeek;
  const draft = getDraft(n);
  if (!draft.notes.trim()) { toast('Add session notes before generating.'); return; }
  const angles = draft.angles.filter(a => a.trim());
  if (angles.length === 0) { toast('Add at least one editorial angle.'); return; }
  const askClaude = getAskClaude();
  if (!askClaude) { toast('askClaude not available in this context.'); return; }

  const btn = document.getElementById('btn-generate');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Generating…';

  try {
    const week = WEEKS.find(w => w.n === n);
    const anglesText = angles.map((a, i) => `Angle ${i+1}: ${a}`).join('\n');
    const result = await askClaude(
      `You are writing a weekly journal synthesis for the AI for Designers workshop.
Week ${n}: "${week.title}"

Voice: first-person plural ("we"), direct, specific, no corporate speak, no em dashes, no aphorisms. Read like a designer talking to another designer. Short paragraphs. No headers unless clearly needed.

Write ${angles.length} variation(s), one per angle below. Separate each variation with the exact string "---VAR---" on its own line.
For each variation also append case study notes — a short paragraph per participant mentioned in the notes, noting what they specifically worked on or decided.

${anglesText}

Session notes:
${draft.notes}`,
      []
    );
    const parts = (result || '').split('---VAR---').map(p => p.trim()).filter(Boolean);
    draft.variations = parts;
    draft.selected = -1;
    draft.editorContent = '';
    saveState();
    render();
    toast(`${parts.length} variation(s) generated.`);
  } catch(e) {
    toast('Error generating: ' + e.message);
  } finally {
    if (btn) { btn.disabled = false; btn.innerHTML = 'Generate variations →'; }
  }
}

function showReview() {
  const n = state.writeWeek;
  const draft = getDraft(n);
  const content = draft.editorContent || (draft.selected >= 0 ? draft.variations[draft.selected] : '');
  if (!content.trim()) { toast('Select and edit a variation first.'); return; }

  const section = document.getElementById('review-section');
  section.style.display = 'block';

  const week = WEEKS.find(w => w.n === n);
  const files = (draft.files || []);
  const imgFiles = files.filter(f => !f.name.endsWith('.html'));
  const htmlFiles = files.filter(f => f.name.endsWith('.html'));

  const items = [
    { path: `Journal/week-0${n < 10 ? '0'+n : n}-synthesis.md`, desc: `Write week ${n} synthesis (${content.split('\n').length} lines)` },
    ...PARTICIPANTS.map(pid => ({
      path: `Journal/participants/${pid}/case-study.md`,
      desc: `Append Week ${n} section for ${PARTICIPANT_NAMES[pid]} (if mentioned in notes)`
    })),
    ...imgFiles.map(f => ({ path: `Journal/week-images/week-${String(n).padStart(2,'0')}/${f.name}`, desc: `Save image` })),
    ...htmlFiles.map(f => ({ path: `Journal/participants/[name]/deliverables/${f.name}`, desc: `Save HTML deliverable` })),
  ];

  section.innerHTML = `
    <div style="font-weight:700;font-size:15px;margin-bottom:16px">Review before publishing</div>
    <div class="review-panel">
      <div class="review-header">Files to be written</div>
      ${items.map(it => `<div class="review-item"><div class="ri-path">${it.path}</div><div class="ri-desc">${it.desc}</div></div>`).join('')}
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" id="btn-confirm-publish">Confirm &amp; publish</button>
      <button class="btn btn-ghost" id="btn-cancel-review">Cancel</button>
    </div>
    <div id="publish-status" style="margin-top:12px;font-size:13px;color:var(--muted)"></div>
  `;
  section.scrollIntoView({ behavior: 'smooth' });

  document.getElementById('btn-confirm-publish')?.addEventListener('click', () => confirmPublish(n, content));
  document.getElementById('btn-cancel-review')?.addEventListener('click', () => {
    section.style.display = 'none';
  });
}

async function confirmPublish(n, content) {
  const statusEl = document.getElementById('publish-status');
  const btn = document.getElementById('btn-confirm-publish');
  if (btn) { btn.disabled = true; btn.textContent = 'Publishing…'; }
  if (statusEl) statusEl.textContent = 'Writing file…';

  const week = WEEKS.find(w => w.n === n);
  const pad = String(n).padStart(2, '0');

  if (!localApiAvailable) { showNoApiModal(); if (btn) { btn.disabled = false; btn.textContent = 'Confirm & publish'; } return; }
  try {
    const filePath = `Journal/week-${pad}-synthesis.md`;
    const wr = await apiWriteText(filePath, content);
    if (!wr.ok) throw new Error(wr.error);
    if (statusEl) statusEl.textContent = 'File written. Committing…';
    await apiGitCommit('Week ' + n + ': ' + (week?.title || 'synthesis'), [filePath]);
    if (statusEl) statusEl.textContent = '✓ Committed.';
    showCommitModal('Week ' + n + ' synthesis committed');
  } catch(e) {
    if (statusEl) statusEl.textContent = '⚠ ' + e.message;
    toast('⚠ ' + e.message);
  }
  if (btn) { btn.disabled = false; btn.textContent = 'Confirm & publish'; }
}

// ─── Case Studies ─────────────────────────────────────────────────────────────
function renderCaseStudies() {
  const cards = PARTICIPANTS.map(pid => {
    const name = PARTICIPANT_NAMES[pid];
    const cs = FD.caseStudies?.[pid] || '';
    const isOpen = state.csOpen[pid] || false;
    const tab = state.csTab[pid] || 'content';

    // count completed weeks
    const weekMatches = cs.match(/###\s+(Week|Session)\s+\d+/gi) || [];
    const completedWeeks = weekMatches.length;

    const inner = isOpen ? renderCsBody(pid, cs, tab, completedWeeks) : '';
    return `<div class="cs-card" id="cs-${pid}">
      <div class="cs-card-header" data-pid="${pid}">
        <div>
          <div class="cs-card-name">${name}</div>
          <div class="cs-card-progress">${completedWeeks} of 12 weeks documented</div>
        </div>
        <span>${isOpen ? '▲' : '▼'}</span>
      </div>
      <div class="cs-card-body${isOpen ? ' open' : ''}" id="csb-${pid}">${inner}</div>
    </div>`;
  }).join('');

  return `<div class="view">
    <div class="view-title">Case Studies</div>
    <div class="view-sub">Five participants — content read from files on your laptop.</div>
    <div class="cs-grid">${cards}</div>
  </div>`;
}

function renderCsBody(pid, cs, tab, completedWeeks) {
  const tabs = ['content','checklist','images','concerns'].map(t =>
    `<div class="tab${t===tab?' active':''}" data-cstab="${t}" data-pid="${pid}">${t.charAt(0).toUpperCase()+t.slice(1)}</div>`
  ).join('');

  let body = '';
  if (tab === 'content') {
    body = `<div class="prose" style="padding:16px">${renderMd(cs)}</div>
      <div style="padding:0 16px 16px">
        <button class="btn btn-secondary btn-sm" data-propose="${pid}">Propose update →</button>
      </div>`;
  } else if (tab === 'checklist') {
    body = renderCsChecklist(pid, cs);
  } else if (tab === 'images') {
    body = `<div class="img-thumbs"><div class="img-thumb">No images yet</div></div>`;
  } else if (tab === 'concerns') {
    const concerns = (state.concerns || {})[pid] || '';
    body = `<div style="padding:16px">
      <div class="section-label">Concerns / To-do</div>
      <textarea class="concerns-area" data-concerns="${pid}" placeholder="Notes, concerns, to-do items for this participant…">${escAttr(concerns)}</textarea>
    </div>`;
  }

  return `<div class="cs-tabs tabs">${tabs}</div><div>${body}</div>`;
}

function renderCsChecklist(pid, cs) {
  const completedNums = new Set();
  const matches = cs.matchAll(/###\s+(Week|Session)\s+(\d+)/gi);
  for (const m of matches) completedNums.add(parseInt(m[2]));

  const rows = Array.from({length:12}, (_,i) => {
    const n = i+1;
    const done = completedNums.has(n);
    return `<div class="week-check-row">
      <input type="checkbox" ${done ? 'checked' : ''} disabled>
      <span class="week-check-label">Week ${n}</span>
      <span class="week-check-note">${done ? 'Documented' : '—'}</span>
    </div>`;
  }).join('');

  return `<div class="week-check-list">${rows}</div>`;
}

function bindCaseStudies() {
  document.querySelectorAll('.cs-card-header').forEach(el => {
    el.addEventListener('click', () => {
      const pid = el.dataset.pid;
      state.csOpen[pid] = !state.csOpen[pid];
      saveState();
      render();
    });
  });
  document.querySelectorAll('[data-cstab]').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      const pid = el.dataset.pid;
      state.csTab[pid] = el.dataset.cstab;
      saveState();
      render();
    });
  });
  document.querySelectorAll('[data-propose]').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      toast('Case study edit — coming soon.');
    });
  });
  document.querySelectorAll('[data-concerns]').forEach(el => {
    el.addEventListener('input', () => {
      const pid = el.dataset.concerns;
      if (!state.concerns) state.concerns = {};
      state.concerns[pid] = el.value;
      saveState();
    });
  });
}

// ─── Entries ──────────────────────────────────────────────────────────────────
function renderEntries() {
  const tab = state.entryTab || 'syntheses';
  const tabs = ['syntheses','casestudies'].map(t =>
    `<div class="tab${t===tab?' active':''}" data-etab="${t}">${t==='syntheses' ? 'Week Syntheses' : 'Case Study Updates'}</div>`
  ).join('');

  let body = '';
  if (tab === 'syntheses') {
    body = WEEKS.map(w => {
      const syn = FD.sessions?.[String(w.n)]?.synthesis;
      const isOpen = state.entryOpen['syn-'+w.n] || false;
      const preview = syn ? syn.replace(/^---[\s\S]*?---\n/, '').split('\n').filter(l=>l.trim()).slice(0,2).join(' ').slice(0,120) + '…' : '';
      return `<div class="entry-item">
        <div class="entry-item-header" data-ekey="syn-${w.n}">
          <div>
            <div class="entry-item-title">Week ${w.n} — ${w.title}</div>
            <div class="entry-item-meta">${w.date} · ${syn ? 'Published' : 'Not written yet'}</div>
          </div>
          <span>${isOpen ? '▲' : '▼'}</span>
        </div>
        ${isOpen && syn ? `<div class="entry-item-body open"><div class="prose">${renderMd(syn)}</div></div>` : ''}
        ${isOpen && !syn ? `<div class="entry-item-body open"><div class="empty-state">Not published yet.</div></div>` : ''}
      </div>`;
    }).join('');
  } else {
    body = PARTICIPANTS.map(pid => {
      const name = PARTICIPANT_NAMES[pid];
      const cs = FD.caseStudies?.[pid] || '';
      const isOpen = state.entryOpen['cs-'+pid] || false;
      return `<div class="entry-item">
        <div class="entry-item-header" data-ekey="cs-${pid}">
          <div>
            <div class="entry-item-title">${name}</div>
            <div class="entry-item-meta">Case study updates</div>
          </div>
          <span>${isOpen ? '▲' : '▼'}</span>
        </div>
        ${isOpen ? `<div class="entry-item-body open"><div class="prose">${renderMd(cs)}</div>
          <div style="margin-top:12px"><button class="btn btn-secondary btn-sm" data-edit-cs="${pid}">Edit &amp; propose update</button></div>
        </div>` : ''}
      </div>`;
    }).join('');
  }

  return `<div class="view">
    <div class="view-title">Entries</div>
    <div class="view-sub">All published content — read from files.</div>
    <div class="tabs">${tabs}</div>
    <div class="entry-list mt8">${body}</div>
  </div>`;
}

function bindEntries() {
  document.querySelectorAll('[data-etab]').forEach(el => {
    el.addEventListener('click', () => { state.entryTab = el.dataset.etab; render(); });
  });
  document.querySelectorAll('[data-ekey]').forEach(el => {
    el.addEventListener('click', () => {
      const key = el.dataset.ekey;
      state.entryOpen[key] = !state.entryOpen[key];
      render();
    });
  });
  document.querySelectorAll('[data-edit-cs]').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      toast('Case study edit — coming soon.');
    });
  });
}

// ─── Sync button ──────────────────────────────────────────────────────────────
async function syncFromFiles() {
  const btn = document.getElementById('btn-sync');
  if (btn) { btn.disabled = true; btn.textContent = '↻ Checking…'; }
  const doReset = () => { if (btn) { btn.disabled = false; btn.textContent = '↻ Sync from files'; } };
  if (!localApiAvailable) { showNoApiModal(); doReset(); return; }
  try {
    const r = await fetch(LOCAL_API + '/status');
    const d = await r.json();
    toast('✓ Connected to ' + (d.root || 'project'));
  } catch(e) { toast('⚠ ' + e.message); }
  doReset();
}

// ─── Push journal to GitHub ────────────────────────────────────────────────────
async function pushJournal() {
  const btn = document.getElementById('btn-push');
  if (btn) { btn.disabled = true; btn.textContent = '↑ Pushing…'; }
  const doReset = () => { if (btn) { btn.disabled = false; btn.textContent = '↑ Push journal'; } };

  if (!localApiAvailable) { showNoApiModal(); doReset(); return; }
  try {
    const written = [];
    for (const [nStr, ed] of Object.entries(state.journalEdits || {})) {
      if (!ed.dirty) continue;
      const n = parseInt(nStr);
      const pad = String(n).padStart(2, '0');
      const origEntry = FD.sessions[String(n)]?.entry || '';
      let newEntry;
      const fmMatch = origEntry.match(/^(---\n)([\s\S]*?)(\n---\n)([\s\S]*)$/);
      if (fmMatch) {
        let fm = fmMatch[2];
        fm = fm.replace(/^quote:.*$/m, 'quote: "' + ed.quote.replace(/\\/g,'\\\\').replace(/"/g,'\\"') + '"');
        fm = fm.replace(/^quoteAttribution:.*$/m, 'quoteAttribution: "' + ed.quoteAttribution.replace(/\\/g,'\\\\').replace(/"/g,'\\"') + '"');
        newEntry = fmMatch[1] + fm + fmMatch[3] + ed.body;
      } else {
        newEntry = ed.body;
      }
      const fp = `content/journal/${pad}.md`;
      const wr = await apiWriteText(fp, newEntry);
      if (!wr.ok) throw new Error(wr.error);
      ed.dirty = false;
      written.push(fp);
    }
    saveState();
    await apiGitCommit('Journal: sync session notes and entries', written.length ? written : ['Journal/', 'content/journal/']);
    showCommitModal('Journal committed');
  } catch(e) {
    toast('⚠ Error: ' + e.message);
  }
  doReset();
}

// ─── Init ─────────────────────────────────────────────────────────────────────
function init() {
  loadState();
  document.querySelectorAll('.nav-item').forEach(el => {
    el.addEventListener('click', () => showView(el.dataset.view));
    el.classList.toggle('active', el.dataset.view === state.view);
  });
  document.getElementById('btn-sync')?.addEventListener('click', syncFromFiles);
  document.getElementById('btn-push')?.addEventListener('click', pushJournal);
  render();

  // Check for local dev server
  detectLocalApi();
}

document.addEventListener('DOMContentLoaded', init);
</script>
