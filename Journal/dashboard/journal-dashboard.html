 ranking colors in pink and blue and orange. Five reference images brought and analyzed, each one contributing something to the brief. A 13-item banned moves list written in. Scope decided: a student list and a top-3 leaderboard, those two things built well before anything else.\n\nThen the brief was followed in three separate sessions. Every single one came back looking the same. Saturated mint and purple cards. Rounded Nunito everything. Emoji avatars with thick colored rings. The brief was being followed precisely. The output was still generic.\n\nIt took until the third attempt to understand why.\n\nThe two screenshots uploaded at the start of the original session were doing more work than the words. Both were children's app UI — saturated colors, mascot blobs, rounded type. Once those were in the conversation, every subsequent prompt got filtered through them regardless of what the brief said. Words can't override images. The model doesn't weigh the brief and the reference equally. It weighs the reference more.\n\nChanging the reference images broke the cycle. Two new ones: a creative kids academy landing page with Fraunces italic headlines mixed with bold sans, and a play-and-learn site with editorial layouts and white-dominant ground. Same audience, opposite visual language. The first build with the new references was the first one that didn't look like the others.\n\nThe second thing that helped was a side-by-side comparison. Telling the model \"this is too generic\" got polite agreement and another generic result. Pasting both versions next to each other and asking it to name the specific differences produced a concrete analysis. The prompt: *\"Compare the differences and write down the findings.\"* That did more diagnostic work than three sessions of brief refinement combined.\n\nThe third finding was about the banned-moves list. Describing what not to do reads to the model as confirmation the aesthetic is in scope. It anchors to the world being described, not the negation. Naming the replacement works better than naming the prohibition.\n\nThe style guide was fully rewritten with all three lessons in it. It opens with a diagnosis of why the first version failed. Every retired element has a named replacement. It closes with a yes-or-no build checklist.\n\nWhat's still undefined: the characters. The avatar system needs a decision — abstract blob creatures, something else — before the next build.\n\n*Screenshot: working HTML prototype — warm cream ground, Nunito, student list with avatar circle slots, purple sidebar, top-3 leaderboard.*\n\n### Week 04 — _to come_\n\n*…through Week 12.*\n\n---\n\n## What I built\n\n*Screenshots of the finished tool. Three to five images covering: the empty class roster, a student tile being tapped, a satisfying micro-animation on point updates, the weekly summary view, what it looks like on a phone in landscape during class.*\n\n## What I changed about how I work\n\n*To fill in week 11–12.*\n\n## What's still wrong with it\n\n*Three things, minimum.*\n\n1.\n2.\n3.\n\n## What I'd do next\n\n*One paragraph. Direction, not features.*\n\n---\n\n## Credits\n\nBuilt during the AI for Designers 12-week program, run by Marko Kolić at Prototyp.\n", "marin": "---\nparticipant: \"Marin\"\nproject: \"Naučimo Hrvatski\"\nstatus: \"draft\"\nsessions_completed: 2\nlast_updated: \"2026-05-13\"\nhero_image: \"\"\nfinal_url: \"\"\n---\n\n# Naučimo Hrvatski\n\n> First-person case study. Marin's voice. Built across 12 sessions. Reviewed by Marin before publication.\n\n## TL;DR\n\nA language-learning app for one specific person. My girlfriend, in Philadelphia, learning Croatian for when she moves to Osijek. A memory book she reads chapter by chapter. Each chapter is one of our actual trips together. To turn the page she has to do something in Croatian: describe a photo, fill in what she would have said, retell the day. Croatian is the price of admission to her own memories. Not Duolingo. Built around one real relationship.\n\n---\n\n## The brief\n\n*Two paragraphs.*\n\nMy girlfriend lives in Philadelphia. I live in Osijek. We FaceTime constantly. She's been picking up Croatian piece by piece, but the apps out there don't help. Duolingo doesn't have Croatian at all. Everything else feels generic, like a textbook with a green owl.\n\nSo I built her something that doesn't feel like an app. It feels like talking to me. Five scenarios from our actual life. The morning call. The evening wind-down. The market. A tour of Osijek. Planning her next visit. An AI that knows our context, responds in Croatian, slips the English translation in next to the line, corrects her without making it a quiz.\n\n## The constraint that mattered most\n\n**Built on conversational AI, not custom curriculum.** I'm a designer, not a linguist. I'm not going to write a Croatian course. What I can do is design the conversations my girlfriend and I already have, and let an AI play my side of them in Croatian.\n\n## The reference move\n\nThe way couples actually talk in another language. Not a course. Not gamification. Specific to her, specific to our life.\n\n*Add 3 reference images here in session 5–6.*\n\n## Session-by-session\n\n### Session 01 — Ran the handbook solo and shipped a prototype.\n\nI joined the workshop in an unusual way. I missed the live session, so I opened the handbook on the workshop site at my own desk and ran Session 01 solo.\n\nClaude interviewed me about my strengths, what I want to be known for, what energizes me versus what drains me. I refused a few generic project directions before I said the thing I actually wanted to build was an app for my girlfriend.\n\nBy the end of my self-directed hour, I had a working prototype with five scenario cards. *Jutarnji poziv*. *Večernji razgovor*. *Na tržnici*. *Grad Osijek*. *Planiranje posjeta.* Each one runs an AI conversational partner in Croatian, with English translations in brackets, gentle correction as you go.\n\nI sent the result back, asked to join as a participant, and got onboarded as the fourth one.\n\nThe thing I haven't done yet, which I'll do before session 02, is name what I'm *not* building. The others did this together in session 01. I was working alone.\n\n*One screenshot of the five-card prototype.*\n\n### Session 02 — Changed my mind about the whole thing.\n\nI came in with the FaceTime app from session 01 and left with a completely different concept. The lever was a research check. We looked at ten indie language apps — TutorLily, Univerbal, Gliglish, Langotalk, TalkBits, AI LingoPlay, Langua, LingoStar, Copycat Cafe, Praktika — and the finding was that no app on the market is built around a couple's actual relationship as the core scenario. That gap was the thing.\n\nOnce I saw it, the conversation app I built in session 01 felt wrong. Not bad, just wrong for what this project should be. The right shape was a memory book.\n\nSo now it's six chapters, mapped to actual trips we've taken since we met:\n\n1. Her first time in Croatia — December 2024 to January 2025\n2. Me in Colorado — April 2025\n3. Me on the Jersey Shore — July 2025\n4. Her second time in Croatia — December 2025 to January 2026\n5. Me back in Colorado — April 2026\n6. Her trip in September 2026, less than four months away\n\nThe way it works: each chapter opens at the airport. Each scene inside is a day or a moment from the trip. A photo, two to four sentences in Croatian with a translation toggle, one language interaction. To turn the page she has to do it. Most scenes are \"describe the photo.\" Each chapter ends with a \"story rebuild\" where she retells the whole trip in Croatian, the AI gently corrects, and the result gets saved as her own in-Croatian version of the trip.\n\nNo streaks. No hearts. No guilt notifications. This is a gift, not Duolingo. If she misses a day, the AI character just picks the conversation back up. Marko would describe it as the part where I refuse to make my girlfriend feel bad for missing a day, which is correct.\n\nClaude pushed back on the six-chapter v1 scope. The recommendation was to build chapter 1 fully before touching the others. Hand it over as a working gift, then keep dropping new chapters into it over time. I haven't committed yet. That's the decision I need to make before session 03.\n\nOther thing to figure out: how I feed Claude descriptions of the trips so the app actually has something to teach from. Photos, contexts, what we ate, what we said. That's writing work I haven't started.\n\n*Screenshot: the chapter map.*\n*Screenshot: the \"describe the photo\" scene template.*\n\n### Session 03 — Locked the direction. Built the first real scene.\n\nThe session focused on visual direction. Three distinct directions generated — Memory Press, Tender Thread, Adriatic Dusk — I selected Adriatic Dusk and iterated from there. Two rounds of mockups, a type system locked, and the first real scene screen built.\n\nThe direction: glassmorphic. Full-bleed trip photography as the background, frosted glass containers floating over it, Playfair Display italic for the Croatian language and the scene titles, DM Sans for the UI chrome. Every screen should feel like opening a private memory. It should never feel like an app.\n\nThe first scene built was Scena 3 · Sarma kod bake. Warm amber background. Playfair italic at display scale for the scene title. Frosted glass narration card. A Marko pill. Word hint chips. Nastavi at the bottom. The line on the narration card: *Bakina kuhinja miriše na nedjelju, na dim i na sarmu.* That's what the whole project is aiming at — one specific kitchen, one specific Sunday, one specific smell.\n\nThe friction through the session was the typeface. I had defined DM Sans for the UI layer. Claude kept defaulting to something else. It took a direct correction and a round of uploaded references to hold it. Once it landed, it landed.\n\nBy the end of the session I had the direction I wanted. The brief is written: five colors inside the warm amber to terracotta to ivory range, two typefaces that never swap roles, a 15-item banned moves list (no bottom tab bars, no green/red feedback, no gradient text, no \"Great job!,\" no \"Streak\").\n\nWhat's next: feeding Claude the actual trip content. Stories, context, photos. That writing work hasn't started, and the scenes can't feel personal and specific until it has.\n\n*Screenshot: the Scena 3 · Sarma kod bake mockup — glassmorphic, full-bleed warm amber, Playfair italic, frosted card, Marko pill.*\n\n### Session 04 — _to come_\n\n*…through Session 12.*\n\n---\n\n## What I built\n\n*Screenshots of the finished app. Three to five images covering: the scenario picker, one scenario in progress, the AI response with translation, the correction flow, the moment she actually uses it.*\n\n## What I changed about how I work\n\n*To fill in session 11–12.*\n\n## What's still wrong with it\n\n*Three things, minimum.*\n\n1.\n2.\n3.\n\n## What I'd do next\n\n*One paragraph. Direction, not features.*\n\n---\n\n## Credits\n\nBuilt during the AI for Designers 12-session workshop, run by Marko at Prototyp. With Ivo, Ivan, and Paula building alongside.\n", "marko": "---\nparticipant: \"Marko Kolić\"\nproject: \"AI for Designers — the program, the website, the journal\"\nstatus: \"draft\"\nweeks_completed: 3\nlast_updated: \"2026-05-20\"\nhero_image: \"\"\nfinal_url: \"\"\n---\n\n# AI for Designers — the meta-project\n\n> First-person case study, Marko's voice. The facilitator running the program also ran his own 12-week build: this website, this journal, the way the whole thing holds together. Reviewed by Marko before publication.\n\n## TL;DR\n\nI built a 12-week workshop for our agency's designers to learn AI by actually shipping something. Then I built the website that frames it, the journal that documents it, and the workflow that turns each session into something a participant takes home. The website is also the proof: a meta-demonstration of what the program teaches.\n\n---\n\n## The brief\n\nI wanted a workshop people would enjoy and learn from. Not a slide deck. Not a recorded course. A weekly hour where designers built something real with Claude. And where the way the program was run was itself an example of the way the program teaches you to work.\n\nSo the \"deliverable\" became three things, not one: the program itself, the website that hosts it, and the journal that documents the whole thing as it happens. All three had to be readable, opinionated, and finished by session 12.\n\n## The constraint that mattered most\n\n**Plain HTML/CSS/JS with a tiny Node build.** No React, no Vite, no CMS. The stack should be readable in an afternoon. If we're teaching designers to work with AI on real things they ship, the program's own site has to be one they could clone and understand. No magic.\n\n## The reference move\n\nEditorial sites, not SaaS marketing pages. Anti-stock as a principle, not a style. The site argues a point of view, and the point of view is the whole program's point of view.\n\n*Add 3 reference images here in week 5–6.*\n\n## Week-by-week\n\n### Week 01 — Build the journal, run the first session.\n\nThe first session ran with three participants in the room: Ivo, Ivan, and Paula. A fourth, Marin, ran the handbook solo at his own desk and asked to join after. While they set their projects, I shipped the journal infrastructure that captures the whole program: raw notes, facilitator synthesis, per-participant case studies, and a public weekly post.\n\nThe copy lesson hit early. First draft was 100% AI-detectable. Ivo could tell within seconds. By v3 it started to not suck. That iteration cycle became something I'd watch for in every session's facilitator output going forward.\n\nThe bigger decision was structural: bring agency experts into the program. Ivan went to talk to Seba, our dev who already shipped Photato. From now on, when a project needs domain expertise the wider team participates as mentors. The program isn't a one-facilitator show.\n\n*One screenshot of the Claude project surface showing the build trail.*\n\n### Week 02 — Rewrote the plan between sessions.\n\nSession 02 gave me two sessions of real participant work to look at. That was enough to see what the program actually needs versus what I'd assumed at the planning stage. So between session 02 and session 03, I did a full revision pass on the workshop plan.\n\nSome sessions changed. A few topics shifted. Parts that had felt necessary on paper but weren't earning their place in the room came out. The remaining sessions are tighter, with more room for participants to plan ahead, test, and review work properly. That's what they actually need at the 1–2 hour per session budget.\n\nThe prompts got rewritten. Every session now has its own set that match what the session is actually asking participants to do, instead of the generic versions I started with. I also added a small intro challenge to the top of every session called *Think Before You Prompt*. It frames how to talk to Claude before opening the chat. A small thing, but the kind of habit that compounds across twelve sessions.\n\nEach session now also names the Claude model and mode it expects. We're running each session in its own chat, so picking the right Claude for the work matters more than it would if the conversation was continuous.\n\nThe journal got a small redesign too. A contents side panel for navigation as more entries land. The voice the AI uses to draft entries got tightened. Multiple rounds of pushback, draft after draft, until the entries actually capture what the session was like instead of reading as polished but empty recaps.\n\nAnd I moved my own work over to Claude Cowork. The personal-Jarvis test, with the workshop as the workload. We'll see how the desktop-agent version handles the more complex agentic tasks.\n\n*Screenshots: the revised session plan diff, the new contents side panel, the Think Before You Prompt page.*\n\n### Week 03 — The briefs were thorough. The outputs were all the same.\n\nThree participants ran the visual direction session and came out with design briefs they'd written themselves. Warm palettes, type systems, banned-moves lists. The briefs were good. The designs weren't.\n\nI watched it happen in the session. Claude produced three initial directions per project. Everyone rejected them, went to Pinterest, brought references back in, iterated. The second-pass outputs were better but still recognizable — the stock spacing, the color choices that belong to a template, the typography that's clean in a way that doesn't belong to anything. At the end, Ivo asked \"how do I make this look less like AI made it?\" Nobody had an answer.\n\nAfter the session I tried running the same prompts myself in chat and got nearly identical results. So I opened separate sessions and started testing.\n\n**The first thing I found: a thorough specification is not the same as a useful brief.**\n\nIvo's brief was the most thorough document any participant had written. Every component specified. Exact values. Layout diagrams in ASCII. I audited the output it produced and found 19 specific AI tells — not vague \"this feels generic,\" but concrete things: `letter-spacing: 0.2em` on every label, `font-weight: 300` used decoratively, a rationale strip at the bottom of the dashboard explaining why the design was unconventional. That last one is the clearest tell. Design that defends itself is admitting the defense is necessary.\n\nThe original brief was a style guide: it described what the output should look like. What I needed to write instead was a constraint system: something that describes what the output cannot be. The difference is operational. A specification tells the model what to generate. A constraint system closes off the default options — the patterns AI reaches for when there's open space — and forces it to find something that isn't the default.\n\nThe rewrite started with two cultural anchors (Braun hardware, Nothing OS) and worked from there. Before touching the dashboard, I built a small testbed component — a 320×420 fitness widget — and derived the constraints from that. By the fifth round of iteration the banned list was longer than the specification. Helvetica Neue instead of Inter. No `font-weight: 300`. No tinted accent variants. No delta arrows. Orange used exactly three times across the whole screen. The widget was the cleanest thing I'd built in the session. We scaled it to the full dashboard with the same constraints applied.\n\nThe closing line of the new brief: *a style guide tells you what something looks like; a constraint system tells you what it can never be.*\n\n**The second thing I found: reference images override words, every time.**\n\nPaula's ClassArcade had run through three separate build sessions and come back looking the same every time. Saturated mint and purple. Rounded Nunito everything. Emoji avatars with thick rings. The brief was being followed. The output was still generic. We added a banned-moves list. The output got worse — describing the things to avoid was confirming they were in scope.\n\nThe root cause was two screenshots uploaded at the start of the original session. Both were children's app UI. Saturated colors, mascot blobs, rounded type. Once those were in the conversation, every subsequent prompt was filtered through them regardless of what the brief said.\n\nChanging the reference images broke the cycle. Two new ones: a kids academy landing page with Fraunces italic headlines mixed with bold sans, a play-and-learn site with white-dominant layouts and editorial type. Same target audience, opposite visual language. The first build with the new references was the first one that didn't look like the others.\n\nThe side-by-side comparison was the technique that made the gap concrete. Telling the model \"this is too generic\" got polite agreement and another generic result. Pasting both versions and asking it to name the specific differences produced an analysis I could actually work from. The prompt: *\"Compare the differences and write down the findings.\"* Four words. More useful than three sessions of brief refinement combined.\n\nBoth briefs got rewritten with these findings built in. The ClassArcade v2 brief opens with a diagnosis of why v1 failed. Every retired element has a named replacement — not just a ban, a replacement. \"Retired: Nunito. Replacement: Fraunces italic for expressive text, Plus Jakarta Sans for interface chrome.\" Ban alone isn't enough. The model anchors to the world being described, not the negation.\n\n**The framework that came out of it:**\n\nThe better approach to AI design prompting isn't more detail. It's more operational restriction. Leave fewer degrees of freedom.\n\nThe most transferable things I learned from this:\n\n*Govering principle over vibe words.* \"Minimal, clean, modern\" leaves the model averaging across thousands of interfaces that match those words. \"Braun hardware plus Nothing OS\" points at a specific design logic — whitespace as structure, typography as hierarchy, restraint as identity — that is much harder to dilute into generic output. Both improved briefs opened with a governing principle that could guide every subsequent decision.\n\n*Typography as identity removes the need for decoration.* Wattlog's TSB at 104px as a typographic object did more than any component spec. ClassArcade's shift from Nunito to Fraunces italic mixed with Plus Jakarta Sans changed how the product felt more than any color decision. When typography carries the personality, color can step back into a signal role. Both improved briefs learned this: restrict color heavily, give it clear roles, no decorative use, no tints. AI overuses color. Good prompts make it scarce.\n\n*Structural instructions changed output more than visual references.* Telling the model to build a table instead of a card list, a ruled ledger instead of stat cards, a hand-drawn chart instead of a chart library — these structural changes produced the most specific output. The model has strong opinions about what a \"dashboard\" or a \"student list\" looks like. Structural instructions block those opinions before they form.\n\n*Every ban needs a replacement.* \"No emoji avatars\" leaves a gap. \"No emoji avatars — use two-letter monogram initials in Plus Jakarta Sans 700\" closes it. A ban alone reads to the model as confirmation the aesthetic is still in scope. The retired-with-replacement structure is the most effective single tool from this session.\n\n*The prompt structure that works:* product job → governing design principle → hard constraints (typeface, color, layout, components) → AI defaults blacklist → retired/replacement rules → output requirements → success checklist. Each section earns its place. The checklist at the end is yes-or-no, not judgment — \"Is Fraunces italic loaded on this screen? Are XP numbers in Fraunces italic 700? Does the headline mix both fonts?\"\n\nThe deeper lesson, which I didn't expect going into this: the model improves when you understand its failure mode and write the brief against it. The briefs that worked weren't written for a human designer. They were written for the specific ways an AI designer degrades.\n\n*Screenshots: the Wattlog testbed widget, the original vs improved dashboard side-by-side, the ClassArcade v1 vs v2 comparison.*\n\n### Week 04 — _to come_\n\n*…through Week 12.*\n\n---\n\n## What I built\n\n*Screenshots: the homepage, the journal page in session 12 with all 12 entries, the per-participant case study pages, the prompt library, the dark/light mode comparison, the Claude project surface showing the build trail.*\n\n## What I changed about how I work\n\n*To fill in week 11–12.*\n\n## What's still wrong with it\n\n*Three things, minimum.*\n\n1.\n2.\n3.\n\n## What I'd do next\n\n*One paragraph. Direction, not features.*\n\n---\n\n## Credits\n\nBuilt during the AI for Designers 12-week program, with Ivo, Ivan, Marin, and Paula building alongside. Agency dev support from Seba (Photato).\n"}, "weekParticipants": {"1": {"ivo": "### Week 01 — The brief\n\nCame in with a project I already half-knew I wanted. The intake interview surfaced what I hadn't named: the design bet is *visual density that stays readable.* That's a hard target. \"Utilitarian\" can slide into \"gray and joyless\" if you don't watch it.\n\n*One screenshot of the brief / first sketch.*", "ivan": "### Week 01 — The brief\n\nThe framing landed in the first session. Six input dimensions (subject, aesthetic preset, framing, lighting, environment, era/texture) combine into pre-engineered prompts under the hood. The user never sees a text field.\n\nThe risk Marko flagged: \"bad generation fallback.\" Easy to defer; worth designing early.\n\n*One screenshot of the brief / first sketch.*", "paula": "### Week 01 — The brief\n\nThe strongest real-user constraint of the three projects: a specific teacher, a specific classroom, a Monday morning use case. Deferring the AI layer was an instinct call — and the right one. The interaction design has to earn the AI, not the other way around.\n\n*One screenshot of the brief / first sketch.*", "marin": "### Session 01 — Ran the handbook solo and shipped a prototype.\n\nI joined the workshop in an unusual way. I missed the live session, so I opened the handbook on the workshop site at my own desk and ran Session 01 solo.\n\nClaude interviewed me about my strengths, what I want to be known for, what energizes me versus what drains me. I refused a few generic project directions before I said the thing I actually wanted to build was an app for my girlfriend.\n\nBy the end of my self-directed hour, I had a working prototype with five scenario cards. *Jutarnji poziv*. *Večernji razgovor*. *Na tržnici*. *Grad Osijek*. *Planiranje posjeta.* Each one runs an AI conversational partner in Croatian, with English translations in brackets, gentle correction as you go.\n\nI sent the result back, asked to join as a participant, and got onboarded as the fourth one.\n\nThe thing I haven't done yet, which I'll do before session 02, is name what I'm *not* building. The others did this together in session 01. I was working alone.\n\n*One screenshot of the five-card prototype.*", "marko": "### Week 01 — Build the journal, run the first session.\n\nThe first session ran with three participants in the room: Ivo, Ivan, and Paula. A fourth, Marin, ran the handbook solo at his own desk and asked to join after. While they set their projects, I shipped the journal infrastructure that captures the whole program: raw notes, facilitator synthesis, per-participant case studies, and a public weekly post.\n\nThe copy lesson hit early. First draft was 100% AI-detectable. Ivo could tell within seconds. By v3 it started to not suck. That iteration cycle became something I'd watch for in every session's facilitator output going forward.\n\nThe bigger decision was structural: bring agency experts into the program. Ivan went to talk to Seba, our dev who already shipped Photato. From now on, when a project needs domain expertise the wider team participates as mentors. The program isn't a one-facilitator show.\n\n*One screenshot of the Claude project surface showing the build trail.*"}, "2": {"ivo": "### Week 02 — Wrote it down.\n\nThe session was research and synthesis. I went through eleven training tools in a matrix and wrote a full project brief for Wattlog. Sixteen features ranked P0 through P3. Seven items on the not-building list, including \"Strava exists.\"\n\nWhat I learned from the matrix: intervals.icu is the closest analytical product to what I want, and it gets the depth right but presents it like a Bloomberg terminal. WHOOP nailed the diagnosis-to-prescription handoff for general fitness. Nobody does that prescriptive layer well for outdoor self-coached cyclists. That's the wedge.\n\nThe session closed with Claude pushing back on the brief across six areas. Honestly, the pushback wasn't very useful — I came in with most of this already worked out, and the session structured it rather than changed the direction. That's fine. The brief on paper is what mattered.\n\n*Screenshot: the 11-tool competitive matrix.*\n*Screenshot: the P0–P3 feature ranking.*", "ivan": "### Week 02 — Three drafts, two arguments, one brief.\n\nThis session got the most pushback of any I've had so far, and most of it was Claude arguing with its own previous draft. The brief went through three versions. Two full rounds where Claude looked at what it just produced and said \"this is wrong, here's why.\"\n\nThings that changed across the drafts:\n\n- Tap-to-refine got cut from v1 and replaced with a lock-and-shuffle pattern. Lock the chips that worked, shuffle the ones that didn't, regenerate. Explicit, not inferred.\n- The input hierarchy got restructured. Subject and Aesthetic Preset are now primary and always visible. The other four dimensions collapse by default. If you only touch the two primary ones, you still get a good result.\n- Background removal moved from a post-generation tool to an input option. \"No background\" is now just one of the choices inside Environment.\n\nI also ran a research check on the API. GPT Image 2 is confirmed: 16 reference images per call, native 2K output, photorealism that handles lighting properly, both `images.generate` and `images.edit` endpoints. Brother it should be a wrapper that converts your inputs into as perfect as possible prompts for the AI.\n\nThe one thing I committed to and want on the record: no text inputs in UI because they force me to think and thinking is tiresome.\n\nWhat's stuck: I'm scared of the API connection. Marko knows. We're doing a group walkthrough in session 04 or 05.\n\n*Screenshot: the 10-tool competitive matrix.*\n*Screenshot: the final brief with the lock-and-shuffle pattern sketched.*", "paula": "### Week 02 — Committed, and made two cuts.\n\nThe first half of the session I was still moving between project ideas. The second half I committed: Classroom Behavior Tracker, built in Claude Code, for one specific teacher I know. Not \"teachers in general.\"\n\nThen I made two scope cuts in the same session that I think will end up being the most important design decisions I make on this thing.\n\n**Students will not use the app.** Only the teacher. The students just look at it. The teacher holds the device, taps points, manages the room. The student view is a scoreboard projected on a screen, not an app on a phone.\n\n**Bad points end up offline.** Negative consequences go to extra homework or a real conversation, not to a public display on the screen. The screen is the reward layer. Punishment lives in real life.\n\nThe research was two artifacts. A 6-tool matrix of the direct competitors — ClassDojo, LiveSchool, Lekktura, Bloomz, Be+, Kickboard — with a \"one technique to borrow\" column. And a deeper 10-reference report on character-driven gamification: TeachQuest, ClassMana, Habitica, Prodigy, Blooket, Gimkit, Joon, Finch, Duolingo Leagues, Mrs Wordsmith.\n\nWhat I took from it: the best student-facing gamification doesn't live in classroom tools. It lives in habit trackers (Habitica), self-care pets (Finch), and chore apps (Joon). I'm going pixel-art, retro, gamified. Habitica is the starting reference. Duolingo's tiered leagues adapt cleanly to a small class.\n\nWhat I want to research before I lock in any visible leaderboard: the psychology of public point displays. PBIS literature on what does and doesn't harm kids when their behavior is visible to the class. I'd love to spend real time on that in session 03 or 04.\n\n*Screenshot: the 6-tool comparison matrix.*\n*Screenshot: the Habitica avatar / profile reference.*", "marin": "### Session 02 — Changed my mind about the whole thing.\n\nI came in with the FaceTime app from session 01 and left with a completely different concept. The lever was a research check. We looked at ten indie language apps — TutorLily, Univerbal, Gliglish, Langotalk, TalkBits, AI LingoPlay, Langua, LingoStar, Copycat Cafe, Praktika — and the finding was that no app on the market is built around a couple's actual relationship as the core scenario. That gap was the thing.\n\nOnce I saw it, the conversation app I built in session 01 felt wrong. Not bad, just wrong for what this project should be. The right shape was a memory book.\n\nSo now it's six chapters, mapped to actual trips we've taken since we met:\n\n1. Her first time in Croatia — December 2024 to January 2025\n2. Me in Colorado — April 2025\n3. Me on the Jersey Shore — July 2025\n4. Her second time in Croatia — December 2025 to January 2026\n5. Me back in Colorado — April 2026\n6. Her trip in September 2026, less than four months away\n\nThe way it works: each chapter opens at the airport. Each scene inside is a day or a moment from the trip. A photo, two to four sentences in Croatian with a translation toggle, one language interaction. To turn the page she has to do it. Most scenes are \"describe the photo.\" Each chapter ends with a \"story rebuild\" where she retells the whole trip in Croatian, the AI gently corrects, and the result gets saved as her own in-Croatian version of the trip.\n\nNo streaks. No hearts. No guilt notifications. This is a gift, not Duolingo. If she misses a day, the AI character just picks the conversation back up. Marko would describe it as the part where I refuse to make my girlfriend feel bad for missing a day, which is correct.\n\nClaude pushed back on the six-chapter v1 scope. The recommendation was to build chapter 1 fully before touching the others. Hand it over as a working gift, then keep dropping new chapters into it over time. I haven't committed yet. That's the decision I need to make before session 03.\n\nOther thing to figure out: how I feed Claude descriptions of the trips so the app actually has something to teach from. Photos, contexts, what we ate, what we said. That's writing work I haven't started.\n\n*Screenshot: the chapter map.*\n*Screenshot: the \"describe the photo\" scene template.*", "marko": "### Week 02 — Rewrote the plan between sessions.\n\nSession 02 gave me two sessions of real participant work to look at. That was enough to see what the program actually needs versus what I'd assumed at the planning stage. So between session 02 and session 03, I did a full revision pass on the workshop plan.\n\nSome sessions changed. A few topics shifted. Parts that had felt necessary on paper but weren't earning their place in the room came out. The remaining sessions are tighter, with more room for participants to plan ahead, test, and review work properly. That's what they actually need at the 1–2 hour per session budget.\n\nThe prompts got rewritten. Every session now has its own set that match what the session is actually asking participants to do, instead of the generic versions I started with. I also added a small intro challenge to the top of every session called *Think Before You Prompt*. It frames how to talk to Claude before opening the chat. A small thing, but the kind of habit that compounds across twelve sessions.\n\nEach session now also names the Claude model and mode it expects. We're running each session in its own chat, so picking the right Claude for the work matters more than it would if the conversation was continuous.\n\nThe journal got a small redesign too. A contents side panel for navigation as more entries land. The voice the AI uses to draft entries got tightened. Multiple rounds of pushback, draft after draft, until the entries actually capture what the session was like instead of reading as polished but empty recaps.\n\nAnd I moved my own work over to Claude Cowork. The personal-Jarvis test, with the workshop as the workload. We'll see how the desktop-agent version handles the more complex agentic tasks.\n\n*Screenshots: the revised session plan diff, the new contents side panel, the Think Before You Prompt page.*"}, "3": {"ivo": "### Week 03 — The brief was the wrong shape.\n\nThe session was visual direction. Two dashboard iterations in the room: the first too flat, everything at the same weight; the second better after one hard note — \"more hierarchy.\" TSB promoted to 64px in accent orange. Prescription text unboxed as a statement. Secondary metrics collapsed to a ruled hairline strip. The brief got written: warm off-white ground, single accent color, two type weights (400 and 500 only), 0.5px borders, no shadows. Art direction committed.\n\nBut I didn't like the result.\n\nMy original brief was thorough. Every component specified. ASCII layout diagrams. Exact values for color, weight, spacing, and radius. It produced exactly what I specified, and what I specified turned out to be the wrong thing. So the session kept going.\n\nWe started the post-session audit with two reference interfaces: the Framer Dieter Rams remix page and the Nothing OS widget grid. Both extreme constraint systems. Both legible because of what they remove. Then we read the dashboard my first brief had produced — not to tweak it, but to find everything wrong with it. Six AI tells on first pass. Nineteen by the time we'd read the file carefully. `letter-spacing: 0.2em` on every label. `font-weight: 300` used decoratively. A rationale strip at the bottom explaining why the design was unconventional. That last one became the finding of the day. Design that has to announce its own unconventionality is admitting it isn't.\n\nThen we built something small first — a 320×420 compact fitness widget — and used it as a testbed for the constraints we actually wanted. Helvetica Neue instead of Inter. Two weights, 600 and 400. No 300. A near-black base with a single off-white card. Braun orange at full saturation or not at all, no rgba variants. One dial with spherical shading pulled from the Rams references. A seven-day history rendered as dot-matrix cells. No pill badges. No delta arrows. No tooltip on hover. By the fifth round the banned list was longer than the specification. The widget that came out was the cleanest thing we'd built.\n\nWe scaled it up to the full dashboard with the same constraints applied. TSB rendered at 104px as a typographic object sitting on the page with no card around it. A ruled metric strip with no card backgrounds. A PMC chart hand-drawn in canvas, no chart library, no axis box. Orange used three times across the whole screen.\n\nThe new brief is a constraint system, not a specification. It opens with a cultural anchor — Dieter Rams and Nothing OS — and the specifications exist mostly as refusals. No Inter. No tinted accent variants. No three-column stat grid. No pill badges. No `font-weight: 300`. The closing line: *a style guide tells you what something looks like; a constraint system tells you what it can never be.*\n\nBoth briefs are in the repo. The contrast between them is the actual artefact.\n\n*Screenshot: the second-iteration dashboard from the session — tabbed nav, \"Productive.\" at large weight, CTL/ATL/TSB in a clean three-column strip, PMC chart with a RACE marker.*\n*Screenshot: the widget testbed — Helvetica Neue, dot-matrix history, Braun orange once.*", "ivan": "### Week 03 — _to come_\n\n*…through Week 12.*\n\n---\n\n## What I built\n\n*Screenshots of the finished tool. Three to five images covering: the empty state, the four-control panel, a generation in progress, a finished mockup, the fallback flow.*\n\n## What I changed about how I work\n\n*To fill in week 11–12.*\n\n## What's still wrong with it\n\n*Three things, minimum.*\n\n1.\n2.\n3.\n\n## What I'd do next\n\n*One paragraph. Direction, not features.*\n\n---\n\n## Credits\n\nBuilt during the AI for Designers 12-week program, run by Marko Kolić at Prototyp.", "paula": "### Week 03 — Three sessions to find the right reference images.\n\nThe session produced three HTML prototype iterations. The first — dark background, pixel font, scanline overlay — rejected immediately. The second and third arrived at the actual direction: warm cream ground, Nunito, vibrant ranking colors in pink and blue and orange. Five reference images brought and analyzed, each one contributing something to the brief. A 13-item banned moves list written in. Scope decided: a student list and a top-3 leaderboard, those two things built well before anything else.\n\nThen the brief was followed in three separate sessions. Every single one came back looking the same. Saturated mint and purple cards. Rounded Nunito everything. Emoji avatars with thick colored rings. The brief was being followed precisely. The output was still generic.\n\nIt took until the third attempt to understand why.\n\nThe two screenshots uploaded at the start of the original session were doing more work than the words. Both were children's app UI — saturated colors, mascot blobs, rounded type. Once those were in the conversation, every subsequent prompt got filtered through them regardless of what the brief said. Words can't override images. The model doesn't weigh the brief and the reference equally. It weighs the reference more.\n\nChanging the reference images broke the cycle. Two new ones: a creative kids academy landing page with Fraunces italic headlines mixed with bold sans, and a play-and-learn site with editorial layouts and white-dominant ground. Same audience, opposite visual language. The first build with the new references was the first one that didn't look like the others.\n\nThe second thing that helped was a side-by-side comparison. Telling the model \"this is too generic\" got polite agreement and another generic result. Pasting both versions next to each other and asking it to name the specific differences produced a concrete analysis. The prompt: *\"Compare the differences and write down the findings.\"* That did more diagnostic work than three sessions of brief refinement combined.\n\nThe third finding was about the banned-moves list. Describing what not to do reads to the model as confirmation the aesthetic is in scope. It anchors to the world being described, not the negation. Naming the replacement works better than naming the prohibition.\n\nThe style guide was fully rewritten with all three lessons in it. It opens with a diagnosis of why the first version failed. Every retired element has a named replacement. It closes with a yes-or-no build checklist.\n\nWhat's still undefined: the characters. The avatar system needs a decision — abstract blob creatures, something else — before the next build.\n\n*Screenshot: working HTML prototype — warm cream ground, Nunito, student list with avatar circle slots, purple sidebar, top-3 leaderboard.*", "marin": "### Session 03 — Locked the direction. Built the first real scene.\n\nThe session focused on visual direction. Three distinct directions generated — Memory Press, Tender Thread, Adriatic Dusk — I selected Adriatic Dusk and iterated from there. Two rounds of mockups, a type system locked, and the first real scene screen built.\n\nThe direction: glassmorphic. Full-bleed trip photography as the background, frosted glass containers floating over it, Playfair Display italic for the Croatian language and the scene titles, DM Sans for the UI chrome. Every screen should feel like opening a private memory. It should never feel like an app.\n\nThe first scene built was Scena 3 · Sarma kod bake. Warm amber background. Playfair italic at display scale for the scene title. Frosted glass narration card. A Marko pill. Word hint chips. Nastavi at the bottom. The line on the narration card: *Bakina kuhinja miriše na nedjelju, na dim i na sarmu.* That's what the whole project is aiming at — one specific kitchen, one specific Sunday, one specific smell.\n\nThe friction through the session was the typeface. I had defined DM Sans for the UI layer. Claude kept defaulting to something else. It took a direct correction and a round of uploaded references to hold it. Once it landed, it landed.\n\nBy the end of the session I had the direction I wanted. The brief is written: five colors inside the warm amber to terracotta to ivory range, two typefaces that never swap roles, a 15-item banned moves list (no bottom tab bars, no green/red feedback, no gradient text, no \"Great job!,\" no \"Streak\").\n\nWhat's next: feeding Claude the actual trip content. Stories, context, photos. That writing work hasn't started, and the scenes can't feel personal and specific until it has.\n\n*Screenshot: the Scena 3 · Sarma kod bake mockup — glassmorphic, full-bleed warm amber, Playfair italic, frosted card, Marko pill.*", "marko": "### Week 03 — The briefs were thorough. The outputs were all the same.\n\nThree participants ran the visual direction session and came out with design briefs they'd written themselves. Warm palettes, type systems, banned-moves lists. The briefs were good. The designs weren't.\n\nI watched it happen in the session. Claude produced three initial directions per project. Everyone rejected them, went to Pinterest, brought references back in, iterated. The second-pass outputs were better but still recognizable — the stock spacing, the color choices that belong to a template, the typography that's clean in a way that doesn't belong to anything. At the end, Ivo asked \"how do I make this look less like AI made it?\" Nobody had an answer.\n\nAfter the session I tried running the same prompts myself in chat and got nearly identical results. So I opened separate sessions and started testing.\n\n**The first thing I found: a thorough specification is not the same as a useful brief.**\n\nIvo's brief was the most thorough document any participant had written. Every component specified. Exact values. Layout diagrams in ASCII. I audited the output it produced and found 19 specific AI tells — not vague \"this feels generic,\" but concrete things: `letter-spacing: 0.2em` on every label, `font-weight: 300` used decoratively, a rationale strip at the bottom of the dashboard explaining why the design was unconventional. That last one is the clearest tell. Design that defends itself is admitting the defense is necessary.\n\nThe original brief was a style guide: it described what the output should look like. What I needed to write instead was a constraint system: something that describes what the output cannot be. The difference is operational. A specification tells the model what to generate. A constraint system closes off the default options — the patterns AI reaches for when there's open space — and forces it to find something that isn't the default.\n\nThe rewrite started with two cultural anchors (Braun hardware, Nothing OS) and worked from there. Before touching the dashboard, I built a small testbed component — a 320×420 fitness widget — and derived the constraints from that. By the fifth round of iteration the banned list was longer than the specification. Helvetica Neue instead of Inter. No `font-weight: 300`. No tinted accent variants. No delta arrows. Orange used exactly three times across the whole screen. The widget was the cleanest thing I'd built in the session. We scaled it to the full dashboard with the same constraints applied.\n\nThe closing line of the new brief: *a style guide tells you what something looks like; a constraint system tells you what it can never be.*\n\n**The second thing I found: reference images override words, every time.**\n\nPaula's ClassArcade had run through three separate build sessions and come back looking the same every time. Saturated mint and purple. Rounded Nunito everything. Emoji avatars with thick rings. The brief was being followed. The output was still generic. We added a banned-moves list. The output got worse — describing the things to avoid was confirming they were in scope.\n\nThe root cause was two screenshots uploaded at the start of the original session. Both were children's app UI. Saturated colors, mascot blobs, rounded type. Once those were in the conversation, every subsequent prompt was filtered through them regardless of what the brief said.\n\nChanging the reference images broke the cycle. Two new ones: a kids academy landing page with Fraunces italic headlines mixed with bold sans, a play-and-learn site with white-dominant layouts and editorial type. Same target audience, opposite visual language. The first build with the new references was the first one that didn't look like the others.\n\nThe side-by-side comparison was the technique that made the gap concrete. Telling the model \"this is too generic\" got polite agreement and another generic result. Pasting both versions and asking it to name the specific differences produced an analysis I could actually work from. The prompt: *\"Compare the differences and write down the findings.\"* Four words. More useful than three sessions of brief refinement combined.\n\nBoth briefs got rewritten with these findings built in. The ClassArcade v2 brief opens with a diagnosis of why v1 failed. Every retired element has a named replacement — not just a ban, a replacement. \"Retired: Nunito. Replacement: Fraunces italic for expressive text, Plus Jakarta Sans for interface chrome.\" Ban alone isn't enough. The model anchors to the world being described, not the negation.\n\n**The framework that came out of it:**\n\nThe better approach to AI design prompting isn't more detail. It's more operational restriction. Leave fewer degrees of freedom.\n\nThe most transferable things I learned from this:\n\n*Govering principle over vibe words.* \"Minimal, clean, modern\" leaves the model averaging across thousands of interfaces that match those words. \"Braun hardware plus Nothing OS\" points at a specific design logic — whitespace as structure, typography as hierarchy, restraint as identity — that is much harder to dilute into generic output. Both improved briefs opened with a governing principle that could guide every subsequent decision.\n\n*Typography as identity removes the need for decoration.* Wattlog's TSB at 104px as a typographic object did more than any component spec. ClassArcade's shift from Nunito to Fraunces italic mixed with Plus Jakarta Sans changed how the product felt more than any color decision. When typography carries the personality, color can step back into a signal role. Both improved briefs learned this: restrict color heavily, give it clear roles, no decorative use, no tints. AI overuses color. Good prompts make it scarce.\n\n*Structural instructions changed output more than visual references.* Telling the model to build a table instead of a card list, a ruled ledger instead of stat cards, a hand-drawn chart instead of a chart library — these structural changes produced the most specific output. The model has strong opinions about what a \"dashboard\" or a \"student list\" looks like. Structural instructions block those opinions before they form.\n\n*Every ban needs a replacement.* \"No emoji avatars\" leaves a gap. \"No emoji avatars — use two-letter monogram initials in Plus Jakarta Sans 700\" closes it. A ban alone reads to the model as confirmation the aesthetic is still in scope. The retired-with-replacement structure is the most effective single tool from this session.\n\n*The prompt structure that works:* product job → governing design principle → hard constraints (typeface, color, layout, components) → AI defaults blacklist → retired/replacement rules → output requirements → success checklist. Each section earns its place. The checklist at the end is yes-or-no, not judgment — \"Is Fraunces italic loaded on this screen? Are XP numbers in Fraunces italic 700? Does the headline mix both fonts?\"\n\nThe deeper lesson, which I didn't expect going into this: the model improves when you understand its failure mode and write the brief against it. The briefs that worked weren't written for a human designer. They were written for the specific ways an AI designer degrades.\n\n*Screenshots: the Wattlog testbed widget, the original vs improved dashboard side-by-side, the ClassArcade v1 vs v2 comparison.*"}}}</script>
<script type="application/json" id="weeks-data">[{"n": 1, "title": "Meet Claude. Pick your project.", "status": "published", "date": "May 8, 2026"}, {"n": 2, "title": "Write the brief. Argue with it.", "status": "published", "date": "May 13, 2026"}, {"n": 3, "title": "Set the visual direction. Fight Claude's taste.", "status": "published", "date": "May 20, 2026"}, {"n": 4, "title": "Plan the whole thing. Wireframes and all.", "status": "upcoming", "date": "May 27, 2026"}, {"n": 5, "title": "Make it clickable. Smoke test the idea.", "status": "upcoming", "date": "Jun 3, 2026"}, {"n": 6, "title": "Designing in Figma. Building with Claude.", "status": "upcoming", "date": "Jun 10, 2026"}, {"n": 7, "title": "Build the core view, section by section.", "status": "upcoming", "date": "Jun 17, 2026"}, {"n": 8, "title": "Save your work. Set up the repo.", "status": "upcoming", "date": "Jun 24, 2026"}, {"n": 9, "title": "Secondary views. Real states.", "status": "upcoming", "date": "Jul 1, 2026"}, {"n": 10, "title": "Connect the API.", "status": "upcoming", "date": "Jul 8, 2026"}, {"n": 11, "title": "Find what's wrong. Pick three to fix.", "status": "upcoming", "date": "Jul 15, 2026"}, {"n": 12, "title": "Polish. Ship. Show.", "status": "upcoming", "date": "Jul 22, 2026"}]</script>

<script>
// ─── Data ───────────────────────────────────────────────────────────────────
const FD = JSON.parse(document.getElementById('fd').textContent);
const WEEKS = JSON.parse(document.getElementById('weeks-data').textContent);
const PARTICIPANTS = JSON.parse(document.getElementById('participants-data').textContent);

// ─── State ───────────────────────────────────────────────────────────────────
let state = {
  view: 'sessions',        // 'sessions' | 'casestudies' | 'entries'
  weekDetail: null,        // week number if showing detail
  weekDetailTab: 'synthesis',
  writeWeek: null,         // week number if in write mode
  writeDraft: {},          // { [weekNum]: { notes, angles, variations, selected, editorContent, files } }
  weekImages: {},          // { [weekNum]: [{ id, name, dataUrl, afterBlock }] }  afterBlock=-1 = unplaced
  journalEdits: {},        // { [weekNum]: { quote, quoteAttribution, body, mode, dirty } }
  csOpen: {},              // { [pid]: bool }
  csTab: {},               // { [pid]: tab }
  entryTab: 'syntheses',
  entryOpen: {},
};

function loadState() {
  try {
    const s = JSON.parse(localStorage.getItem('afd-journal-v3') || '{}');
    if (s.writeDraft) state.writeDraft = s.writeDraft;
    if (s.weekImages) state.weekImages = s.weekImages;
    if (s.imgSaved) state.imgSaved = s.imgSaved;
    if (s.journalEdits) state.journalEdits = s.journalEdits;
    if (s.csOpen) state.csOpen = s.csOpen;
    if (s.csTab) state.csTab = s.csTab;
    if (s.view) state.view = s.view;
    if (s.concerns) state.concerns = s.concerns;
  } catch(e) {}
}

function saveState() {
  try {
    localStorage.setItem('afd-journal-v3', JSON.stringify({
      writeDraft: state.writeDraft,
      weekImages: state.weekImages,
      imgSaved: state.imgSaved || {},
      csOpen: state.csOpen,
      csTab: state.csTab,
      view: state.view,
      concerns: state.concerns || {},
      journalEdits: state.journalEdits
    }));
  } catch(e) {}
}

// ─── Markdown renderer ───────────────────────────────────────────────────────
function renderMd(md) {
  if (!md) return '<p><em>No content.</em></p>';
  // strip front matter
  md = md.replace(/^---[\s\S]*?---\n/, '');
  // Pre-extract raw HTML blocks so they survive line-by-line parsing
  const htmlBlocks = [];
  md = md.replace(/<figure[\s\S]*?<\/figure>/g, function(match) {
    var idx = htmlBlocks.length;
    var altM = match.match(/alt="([^"]*)"/);
    var capM = match.match(/<figcaption>([\s\S]*?)<\/figcaption>/);
    var alt = altM ? altM[1] : 'Image';
    var cap = capM ? capM[1] : '';
    htmlBlocks.push(
      '<div class="journal-figure">' +
      '<div class="journal-figure-placeholder">🖼 ' + escHtml(alt) + '</div>' +
      (cap ? '<figcaption>' + escHtml(cap) + '</figcaption>' : '') +
      '</div>'
    );
    return 'FIGBLK' + idx;
  });
  let html = '';
  const lines = md.split('\n');
  let inCode = false, inBlockquote = false, inUl = false, inOl = false;
  for (let i = 0; i < lines.length; i++) {
    let l = lines[i];
    if (l.startsWith('```')) {
      if (!inCode) { html += '<pre><code>'; inCode = true; }
      else { html += '</code></pre>'; inCode = false; }
      continue;
    }
    if (inCode) { html += escHtml(l) + '\n'; continue; }
    if (l.startsWith('# ')) { html += '<h1>' + inline(l.slice(2)) + '</h1>'; continue; }
    if (l.startsWith('## ')) { html += '<h2>' + inline(l.slice(3)) + '</h2>'; continue; }
    if (l.startsWith('### ')) { html += '<h3>' + inline(l.slice(4)) + '</h3>'; continue; }
    if (l.startsWith('#### ')) { html += '<h3>' + inline(l.slice(5)) + '</h3>'; continue; }
    if (l.startsWith('> ')) { html += '<blockquote><p>' + inline(l.slice(2)) + '</p></blockquote>'; continue; }
    if (l.startsWith('- ') || l.startsWith('* ')) {
      if (!inUl) { html += '<ul>'; inUl = true; }
      html += '<li>' + inline(l.slice(2)) + '</li>';
      if (i+1 >= lines.length || (!lines[i+1].startsWith('- ') && !lines[i+1].startsWith('* '))) {
        html += '</ul>'; inUl = false;
      }
      continue;
    }
    if (/^\d+\. /.test(l)) {
      if (!inOl) { html += '<ol>'; inOl = true; }
      html += '<li>' + inline(l.replace(/^\d+\. /,'')) + '</li>';
      if (i+1 >= lines.length || !/^\d+\. /.test(lines[i+1])) {
        html += '</ol>'; inOl = false;
      }
      continue;
    }
    if (l.startsWith('---')) { html += '<hr>'; continue; }
    if (l.trim() === '') { html += ''; continue; }
    html += '<p>' + inline(l) + '</p>';
  }
  // Restore HTML blocks (they appear as <p>FIGBLKn</p> after parsing)
  htmlBlocks.forEach(function(block, idx) {
    html = html.split('<p>FIGBLK' + idx + '</p>').join(block);
    html = html.split('FIGBLK' + idx).join(block); // fallback for bare occurrences
  });
  return html;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function inline(s) {
  return s
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/`(.+?)`/g,'<code>$1</code>')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank">$1</a>');
}

// ─── Front matter helpers ────────────────────────────────────────────────────
function parseFrontMatter(content) {
  if (!content) return { title: '', quote: '', quoteAttribution: '', body: '' };
  var m = content.match(/^---\n([\s\S]*?)\n---\n([\s\S]*)$/);
  if (!m) return { title: '', quote: '', quoteAttribution: '', body: content };
  var fm = m[1], body = m[2];
  var get = function(key) {
    var r = fm.match(new RegExp('^' + key + ':\\s*["\']?([^"\'\\n]*)["\']?\\s*$', 'm'));
    return r ? r[1].trim() : '';
  };
  return { title: get('title'), quote: get('quote'), quoteAttribution: get('quoteAttribution'), body: body };
}

function getJournalEdit(n, entry) {
  if (!state.journalEdits[n]) {
    var fm = parseFrontMatter(entry || '');
    state.journalEdits[n] = { mode: 'preview', quote: fm.quote, quoteAttribution: fm.quoteAttribution, body: fm.body, dirty: false };
  }
  return state.journalEdits[n];
}

// ─── Toast ────────────────────────────────────────────────────────────────────
function toast(msg, dur = 3500) {
  const el = document.createElement('div');
  el.className = 'toast-msg';
  el.textContent = msg;
  document.getElementById('toast').appendChild(el);
  requestAnimationFrame(() => { el.classList.add('show'); });
  setTimeout(() => {
    el.classList.remove('show');
    setTimeout(() => el.remove(), 300);
  }, dur);
}

const LOCAL_API = 'http://localhost:3000/api';
let localApiAvailable = false;

async function detectLocalApi() {
  try {
    const r = await fetch(LOCAL_API + '/status', { signal: AbortSignal.timeout(800) });

async function apiPost(endpoint, body) {
  const r = await fetch(LOCAL_API + endpoint, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },

  });
  return r.json();
}

// ─── Save images to journal ───────────────────────────────────────────────────
async function saveImagesToJournal(n) {
  const imgs = getWeekImgs(n);
  if (!imgs.length) { toast('No images to save.'); return; }
  if (!localApiAvailable) { showNoApiModal(); return; }

  const btn = document.getElementById('btn-save-images');
  if (btn) { btn.disabled = true; btn.textContent = 'Saving images…'; }
  const resetBtn = () => { if (btn) { btn.disabled = false; btn.textContent = 'Save images to Journal'; } };

  const pad = String(n).padStart(2, '0');

  try {
    // 1. Write each image file via local API
    for (const img of imgs) {
      const filePath = `src/assets/weeks/${pad}/${img.name}`;
      const r = await apiWriteImage(filePath, img.dataUrl);
      if (!r.ok) throw new Error('Failed to write ' + img.name + ': ' + r.error);
    }

    // 2. Update the markdown entry to weave in <figure> tags
    const origEntry = FD.sessions[String(n)]?.entry || '';
    const fmMatch = origEntry.match(/^(---\n[\s\S]*?\n---\n)/);
    const frontMatter = fmMatch ? fmMatch[1] : '';
    const bodyOnly = origEntry.replace(/^---\n[\s\S]*?\n---\n/, '');
    const bodyClean = bodyOnly.replace(/<figure[\s\S]*?<\/figure>\n*/g, '').trim();
    const blocks = bodyClean.split(/\n{2,}/).map(b => b.trim()).filter(Boolean);

    const makeFigure = img =>
      `<figure class="journal-figure">\n  <img src="../assets/weeks/${pad}/${img.name}" alt="${(img.alt||img.name).replace(/"/g,'&quot;')}">\n  <figcaption>${escHtml(img.alt||img.name)}</figcaption>\n</figure>`;

    const newBlocks = [];
    imgs.filter(i => i.afterBlock === -1).forEach(img => newBlocks.push(makeFigure(img)));
    blocks.forEach((block, i) => {
      newBlocks.push(block);
      imgs.filter(im => im.afterBlock === i).forEach(img => newBlocks.push(makeFigure(img)));
    });

    const newEntry = frontMatter + newBlocks.join('\n\n') + '\n';
    const writeR = await apiWriteText(`content/journal/${pad}.md`, newEntry);
    if (!writeR.ok) throw new Error('Failed to write markdown: ' + writeR.error);

    // 3. Commit
    const gitR = await apiGitCommit('Week ' + n + ': add images to journal entry',
      [`content/journal/${pad}.md`, `src/assets/weeks/${pad}/`]);

    if (!state.imgSaved) state.imgSaved = {};
    state.imgSaved[n] = true;
    saveState();
    render();

    const out = (gitR.output || '').trim();
    showCommitModal(imgs.length + ' image' + (imgs.length > 1 ? 's' : '') + ' saved and committed');
  } catch(e) {
    toast('⚠ ' + e.message);
    resetBtn();
  }
}
