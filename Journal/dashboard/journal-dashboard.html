<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI for Designers — Journal Dashboard</title>
<style>
:root {
  --bg: #ffffff;
  --surface: #f9f9f9;
  --border: #e8e8e8;
  --text: #111111;
  --muted: #777777;
  --faint: #f4f4f4;
  --accent: #111111;
  --accent-inv: #ffffff;
  --pub: #16a34a;
  --pub-bg: #f0fdf4;
  --r: 6px;
  --font: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: var(--font); background: var(--bg); color: var(--text); font-size: 14px; }

/* Layout */
#app { display: flex; height: 100vh; overflow: hidden; }
#sidebar { width: 190px; min-width: 190px; background: var(--faint); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; padding: 16px 0 8px; }
#main { flex: 1; overflow-y: auto; }

/* Sidebar nav */
.nav-logo { padding: 0 14px 16px; font-size: 11px; font-weight: 700; letter-spacing: .08em;
  text-transform: uppercase; color: var(--muted); border-bottom: 1px solid var(--border); margin-bottom: 8px; }
.nav-item { display: flex; align-items: center; gap: 8px; padding: 8px 14px; cursor: pointer;
  font-size: 13px; color: var(--muted); border-radius: 0; transition: background .1s, color .1s; user-select: none; }
.nav-item:hover { background: var(--border); color: var(--text); }
.nav-item.active { background: var(--accent); color: var(--accent-inv); }
.nav-item .icon { font-size: 15px; width: 18px; text-align: center; }
.nav-spacer { flex: 1; }
.nav-sync { margin: 4px 10px 0; }
.nav-sync button { width: 100%; padding: 7px 10px; background: none; border: 1px solid var(--border);
  border-radius: var(--r); font-size: 12px; cursor: pointer; color: var(--muted); }
.nav-sync button:hover { border-color: var(--text); color: var(--text); }

/* View wrapper */
.view { padding: 28px 32px; max-width: 960px; }
.view-title { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
.view-sub { color: var(--muted); font-size: 13px; margin-bottom: 24px; }

/* Week grid */
.week-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
.week-card { border: 1px solid var(--border); border-radius: var(--r); padding: 14px 16px;
  cursor: pointer; transition: border-color .15s, box-shadow .15s; }
.week-card:hover { border-color: #aaa; box-shadow: 0 2px 8px rgba(0,0,0,.06); }
.week-card.published { border-left: 3px solid var(--pub); }
.week-card.upcoming { border-left: 3px solid var(--border); }
.week-card .wc-num { font-size: 11px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase;
  color: var(--muted); margin-bottom: 4px; }
.week-card .wc-title { font-size: 14px; font-weight: 600; margin-bottom: 8px; line-height: 1.35; }
.week-card .wc-meta { display: flex; align-items: center; justify-content: space-between; }
.week-card .wc-date { font-size: 11px; color: var(--muted); }
.week-badge { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 20px; text-transform: uppercase; letter-spacing: .06em; }
.week-badge.published { background: var(--pub-bg); color: var(--pub); }
.week-badge.upcoming { background: var(--faint); color: var(--muted); }

/* Back button */
.back-btn { display: inline-flex; align-items: center; gap: 6px; color: var(--muted); cursor: pointer;
  font-size: 13px; margin-bottom: 20px; padding: 4px 0; }
.back-btn:hover { color: var(--text); }

/* Tabs */
.tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 24px; }
.tab { padding: 8px 16px; font-size: 13px; cursor: pointer; color: var(--muted); border-bottom: 2px solid transparent;
  margin-bottom: -1px; transition: color .15s; }
.tab:hover { color: var(--text); }
.tab.active { color: var(--text); font-weight: 600; border-bottom-color: var(--text); }
.tab-content { display: none; }
.tab-content.active { display: block; }

/* Prose render */
.prose { line-height: 1.7; font-size: 14px; max-width: 700px; }
.prose h1 { font-size: 20px; font-weight: 700; margin: 0 0 16px; }
.prose h2 { font-size: 16px; font-weight: 700; margin: 24px 0 10px; }
.prose h3 { font-size: 14px; font-weight: 700; margin: 20px 0 8px; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; }
.prose p { margin: 0 0 12px; }
.prose blockquote { border-left: 3px solid var(--border); padding-left: 16px; color: var(--muted); margin: 16px 0; font-style: italic; }
.prose hr { border: none; border-top: 1px solid var(--border); margin: 24px 0; }
.prose strong { font-weight: 700; }
.prose em { font-style: italic; }
.prose code { font-family: monospace; background: var(--faint); padding: 1px 5px; border-radius: 3px; font-size: 12px; }
.prose pre { background: var(--faint); padding: 12px; border-radius: var(--r); overflow-x: auto; margin: 12px 0; }
.prose ul, .prose ol { margin: 0 0 12px 20px; }
.prose li { margin-bottom: 4px; }

/* Participant week sections */
.participant-section { border: 1px solid var(--border); border-radius: var(--r); margin-bottom: 12px; overflow: hidden; }
.participant-header { padding: 12px 16px; background: var(--faint); font-weight: 600; font-size: 13px; }
.participant-body { padding: 16px; }
.participant-body.empty { color: var(--muted); font-style: italic; font-size: 13px; }

/* Write Entry */
.write-section { margin-bottom: 28px; }
.write-label { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em;
  color: var(--muted); margin-bottom: 8px; }
.write-notes { width: 100%; min-height: 180px; border: 1px solid var(--border); border-radius: var(--r);
  padding: 12px; font-family: var(--font); font-size: 14px; resize: vertical; outline: none; }
.write-notes:focus { border-color: var(--text); }

.drop-zone { border: 2px dashed var(--border); border-radius: var(--r); padding: 24px; text-align: center;
  color: var(--muted); font-size: 13px; cursor: pointer; transition: border-color .15s, background .15s; }
.drop-zone:hover, .drop-zone.drag-over { border-color: var(--text); background: var(--faint); }
.file-list { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 8px; }
.file-chip { display: flex; align-items: center; gap: 6px; border: 1px solid var(--border);
  border-radius: 4px; padding: 4px 10px; font-size: 12px; background: var(--faint); }
.file-chip .fc-remove { cursor: pointer; color: var(--muted); font-size: 11px; margin-left: 2px; }
.file-chip .fc-remove:hover { color: #e00; }
.file-preview { margin-top: 10px; }
.file-preview iframe { width: 100%; height: 200px; border: 1px solid var(--border); border-radius: var(--r); }

.angles-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
.angle-row { display: flex; gap: 8px; align-items: flex-start; }
.angle-num { font-size: 12px; font-weight: 700; color: var(--muted); padding-top: 8px; min-width: 16px; }
.angle-input { flex: 1; border: 1px solid var(--border); border-radius: var(--r);
  padding: 8px 10px; font-family: var(--font); font-size: 13px; resize: none; outline: none; }
.angle-input:focus { border-color: var(--text); }

/* Variation cards */
.variations-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 20px; }
.var-card { border: 1px solid var(--border); border-radius: var(--r); cursor: pointer;
  transition: border-color .15s, box-shadow .15s; overflow: hidden; }
.var-card:hover { border-color: #aaa; box-shadow: 0 2px 10px rgba(0,0,0,.06); }
.var-card.selected { border-color: var(--text); box-shadow: 0 0 0 2px var(--text); }
.var-card-header { padding: 10px 14px; background: var(--faint); border-bottom: 1px solid var(--border);
  font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; }
.var-card-body { padding: 14px; font-size: 13px; line-height: 1.6; max-height: 320px; overflow-y: auto; white-space: pre-wrap; }

/* Editor area */
.editor-area { width: 100%; min-height: 300px; border: 1px solid var(--border); border-radius: var(--r);
  padding: 14px; font-family: var(--font); font-size: 14px; line-height: 1.7; resize: vertical; outline: none; }
.editor-area:focus { border-color: var(--text); }

/* Pre-publish review */
.review-panel { border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; margin-bottom: 20px; }
.review-header { padding: 12px 16px; background: var(--faint); border-bottom: 1px solid var(--border);
  font-weight: 700; font-size: 13px; }
.review-item { padding: 10px 16px; border-bottom: 1px solid var(--border); font-size: 13px; }
.review-item:last-child { border-bottom: none; }
.review-item .ri-path { font-family: monospace; font-size: 12px; color: var(--muted); }
.review-item .ri-desc { margin-top: 2px; }

/* Buttons */
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 18px; border-radius: var(--r);
  font-size: 13px; font-weight: 600; cursor: pointer; border: none; transition: opacity .15s; }
.btn:hover { opacity: .82; }
.btn:disabled { opacity: .4; cursor: not-allowed; }
.btn-primary { background: var(--text); color: var(--accent-inv); }
.btn-secondary { background: var(--faint); border: 1px solid var(--border); color: var(--text); }
.btn-ghost { background: none; border: 1px solid var(--border); color: var(--muted); }
.btn-sm { padding: 6px 12px; font-size: 12px; }
.btn-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }

/* Case Studies */
.cs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.cs-card { border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; }
.cs-card-header { padding: 14px 16px; background: var(--faint); cursor: pointer;
  display: flex; align-items: center; justify-content: space-between; }
.cs-card-header:hover { background: var(--border); }
.cs-card-name { font-weight: 700; font-size: 14px; }
.cs-card-progress { font-size: 12px; color: var(--muted); }
.cs-card-body { display: none; padding: 0; }
.cs-card-body.open { display: block; }
.cs-tabs { border-bottom: 1px solid var(--border); }

/* Week checklist */
.week-check-list { padding: 16px; }
.week-check-row { display: flex; align-items: center; gap: 10px; padding: 5px 0;
  border-bottom: 1px solid var(--faint); }
.week-check-row:last-child { border-bottom: none; }
.week-check-row input[type=checkbox] { accent-color: var(--text); }
.week-check-label { flex: 1; font-size: 13px; }
.week-check-note { font-size: 12px; color: var(--muted); flex: 2; }

/* Entries */
.entry-list { display: flex; flex-direction: column; gap: 8px; }
.entry-item { border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; }
.entry-item-header { padding: 12px 16px; display: flex; align-items: center; justify-content: space-between;
  cursor: pointer; background: var(--faint); }
.entry-item-header:hover { background: var(--border); }
.entry-item-title { font-weight: 600; font-size: 13px; }
.entry-item-meta { font-size: 12px; color: var(--muted); }
.entry-item-body { display: none; padding: 16px; border-top: 1px solid var(--border); }
.entry-item-body.open { display: block; }

/* Toast */
#toast { position: fixed; bottom: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
.toast-msg { background: var(--text); color: var(--accent-inv); padding: 10px 16px; border-radius: var(--r);
  font-size: 13px; opacity: 0; transform: translateY(8px); transition: opacity .2s, transform .2s; pointer-events: none; }
.toast-msg.show { opacity: 1; transform: none; }

/* Loading states */
.spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid var(--border);
  border-top-color: var(--text); border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-row { display: flex; align-items: center; gap: 10px; padding: 20px 0; color: var(--muted); font-size: 13px; }

/* Empty states */
.empty-state { padding: 40px 20px; text-align: center; color: var(--muted); font-size: 13px; }

/* Concerns textarea */
.concerns-area { width: 100%; min-height: 80px; border: 1px solid var(--border); border-radius: var(--r);
  padding: 10px; font-family: var(--font); font-size: 13px; resize: vertical; outline: none; }
.concerns-area:focus { border-color: var(--text); }

/* Image editor — retroactive upload + drag placement */
.img-editor { display: grid; grid-template-columns: 200px 1fr; gap: 20px; align-items: start; }
.img-palette { border-right: 1px solid var(--border); padding-right: 20px; position: sticky; top: 0; max-height: 100vh; overflow-y: auto; padding-bottom: 20px; }
.img-palette-list { margin-top: 10px; display: flex; flex-direction: column; gap: 8px; }
.img-tile { border: 1px solid var(--border); border-radius: var(--r); padding: 8px; cursor: grab;
  background: var(--bg); transition: border-color .15s, box-shadow .15s; user-select: none; }
.img-tile:active { cursor: grabbing; }
.img-tile:hover { border-color: #aaa; box-shadow: 0 2px 6px rgba(0,0,0,.07); }
.img-tile.dragging { opacity: .4; }
.img-tile img { width: 100%; height: 64px; object-fit: cover; border-radius: 4px; display: block; }
.img-tile-input { width: 100%; border: 1px solid var(--border); border-radius: 3px; padding: 3px 6px;
  font-family: var(--font); font-size: 11px; margin-top: 4px; outline: none; background: var(--bg); color: var(--text); }
.img-tile-input:focus { border-color: var(--text); }
.img-tile-field-label { font-size: 10px; color: var(--muted); margin-top: 5px; text-transform: uppercase; letter-spacing: .05em; }
.img-tile-remove { font-size: 10px; color: #e00; cursor: pointer; margin-top: 5px; display: inline-block; }
.img-tile-remove:hover { text-decoration: underline; }

.img-content-area { overflow-y: auto; }
.content-block { padding: 6px 0; line-height: 1.7; font-size: 14px; }
.drop-bar { min-height: 28px; display: flex; align-items: center; justify-content: center; gap: 6px;
  border: 2px dashed transparent; border-radius: 4px; color: transparent; font-size: 11px;
  margin: 4px 0; transition: border-color .15s, background .15s; cursor: default; overflow: visible; }
.drop-bar:not(.has-image):not(.drag-over) { min-height: 20px; }
.drop-bar.has-image { border: 1px solid var(--border); background: var(--faint); border-radius: var(--r);
  padding: 8px 10px; margin: 8px 0; align-items: flex-start; flex-direction: column; gap: 6px; }
.drop-bar.drag-over { border: 2px dashed var(--text); background: var(--faint); color: var(--text); min-height: 36px; }
.drop-bar:not(.has-image):hover { border: 2px dashed var(--border); color: var(--muted); }
.placed-image-row { display: flex; align-items: center; gap: 10px; width: 100%; }
.placed-image-row img { height: 52px; width: 72px; object-fit: cover; border-radius: 4px; border: 1px solid var(--border); flex-shrink: 0; }
.placed-image-row .pi-name { font-size: 12px; color: var(--muted); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.placed-image-row .pi-remove { font-size: 11px; color: #c00; cursor: pointer; white-space: nowrap; flex-shrink: 0; }
.placed-image-row .pi-remove:hover { text-decoration: underline; }

/* Journal entry edit mode */
.je-toolbar { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; padding-bottom: 14px; border-bottom: 1px solid var(--border); }
.je-toolbar-left { display: flex; gap: 6px; }
.je-toolbar-right { display: flex; align-items: center; gap: 10px; margin-left: auto; }
.je-draft-note { font-size: 11px; color: var(--muted); }
.je-input { width: 100%; border: 1px solid var(--border); border-radius: var(--r); padding: 8px 10px;
  font-family: var(--font); font-size: 14px; outline: none; }
.je-input:focus { border-color: var(--text); }
.je-quote-block { background: var(--faint); border-left: 3px solid var(--border); border-radius: 0 var(--r) var(--r) 0; padding: 14px 16px; margin-bottom: 20px; }
.je-quote-display { font-style: italic; font-size: 15px; line-height: 1.6; margin-bottom: 6px; }
.je-quote-attr { font-size: 12px; color: var(--muted); }
/* Figure blocks */
.journal-figure { margin: 16px 0; border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; }
.journal-figure figcaption { padding: 8px 12px; font-size: 12px; color: var(--muted); background: var(--faint); }
.journal-figure-placeholder { padding: 20px; background: var(--faint); display: flex; align-items: center; gap: 10px; color: var(--muted); font-size: 12px; }
/* Utility */
.mt8 { margin-top: 8px; }
.mt16 { margin-top: 16px; }
.mt24 { margin-top: 24px; }
.section-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: 8px; }
/* Push modal */
.push-modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:9999; display:flex; align-items:center; justify-content:center; }
.push-modal { background:var(--bg); border:1px solid var(--border); border-radius:var(--r); padding:24px 28px; max-width:500px; width:90%; box-shadow:0 8px 32px rgba(0,0,0,.18); }
.push-modal h3 { font-size:14px; font-weight:700; margin:0 0 6px; }
.push-modal p { font-size:13px; color:var(--muted); margin:0 0 12px; }
.push-modal-cmd { font-family:monospace; font-size:12px; background:var(--faint); border:1px solid var(--border); border-radius:4px; padding:10px 14px; margin:0 0 14px; word-break:break-all; user-select:all; cursor:text; }
.push-modal-actions { display:flex; gap:8px; }
</style>
<script type="application/json" id="fd">{"sessions": {"1": {"synthesis": "# AI for Designers — Week 01\n## Meet Claude, pick your project\n\n**Session:** Week 1 of 12\n**Participants present:** 4 (Ivo, Ivan, Paula, Marin — Marin ran the handbook solo and joined after)\n\n---\n\n## The participants & their projects\n\n### Ivo — Personal Cycling & Training Dashboard\n\nAn engineering mindset applied to athletic performance data. The project: a single-purpose web tool that ingests exported training data from Garmin, power meter, and HR monitor, and turns it into clear, actionable insights — power zones, training load, ride history, performance trends.\n\n**Design direction:** Clean, data-dense UI. No decorative fluff. Dieter Rams applied to athletic data. Structured visualizations built on a consistent internal design language.\n\n**Scope constraint:** No live API integration. CSV export from Garmin Connect keeps the weekly budget on design and insight, not plumbing.\n\n**What success looks like:** A working tool Ivo actually uses to train smarter. Not a portfolio piece. Not a concept. Something real.\n\n---\n\n### Ivan — Mockup Generator\n\nA tool built from a genuine workflow frustration. Designers upload a graphic asset and generate realistic mockups — t-shirts, hoodies, posters, decks — by dialing in a visual feeling rather than writing prompts. Four clicks, one generation. The interface does the thinking.\n\n**Design direction:** Simple to the point of feeling obvious. Six input dimensions (subject, aesthetic preset, framing, lighting, environment, era/texture) combine into pre-engineered prompts under the hood. The user never sees a text field.\n\n**Scope constraint:** No custom model training. Generation runs on existing image gen APIs (Flux or Ideogram) with pre-engineered style presets handling aesthetic consistency. Graceful fallback for bad generations.\n\n**What success looks like:** A tool Ivan actually uses in his own workflow. Replaces a 20-minute mockup hunt with a 30-second generation.\n\n---\n\n### Paula — Classroom Behavior Tracker\n\nBuilt around a real relationship with a real user — a specific teacher who will actually use it. Teachers open it during class to log positive and negative behavior points per student across focus, participation, and disruption. AI-generated weekly summaries surface patterns and flag students who need attention.\n\n**Design direction:** Playful but purposeful. Color-coded scoring, satisfying micro-animations on point updates, strong visual hierarchy per student. Mobile-first for classroom conditions.\n\n**Scope constraint:** No backend or user accounts in week one. Data lives in session or local storage. The AI layer comes in week 10, not week 1.\n\n**What success looks like:** A working tool a real teacher opens during a real class. Not a Figma prototype. Something that gets used on Monday morning.\n\n---\n\n### Marin — Naučimo Hrvatski\n\nA language-learning app built around one real relationship. Marin's long-distance girlfriend in Philadelphia is learning Croatian for her eventual move to Osijek. The app simulates the FaceTime conversations they actually have. Five scenario cards built during the session: *Jutarnji poziv* (morning call), *Večernji razgovor* (evening conversation), *Na tržnici* (at the market), *Grad Osijek* (the city), *Planiranje posjeta* (planning a visit). An AI plays a Croatian boyfriend character, responds in Croatian with English in brackets, gently corrects.\n\n**Design direction:** Not defined yet. Marin ran the session solo from the handbook and didn't have the group conversation about visual direction. To be shaped in sessions 02–03.\n\n**Scope constraint:** Implicit, not yet named. Built on conversational AI rather than custom curriculum. The explicit \"what I am *not* building\" conversation didn't happen during his solo run — needs to happen before session 02.\n\n**What success looks like:** His girlfriend actually uses it. Replaces (or supplements) generic apps. Better than Duolingo at the specific thing Duolingo doesn't do — Croatian, in the context of one real relationship.\n\n---\n\n## Patterns across the group\n\nAll four participants arrived with the same instinct: **build for a real problem, not a portfolio brief.** None of the four projects is a concept. All four have a named success condition that involves actual use by an actual person — two of them by the designer themselves (Ivo, Ivan), two of them by someone the designer loves (Paula's teacher, Marin's girlfriend).\n\nThere's also a shared scope discipline among the three who did the live session. Each of Ivo, Ivan, and Paula independently named what they were *not* building and why — live API integration, custom model training, complex backend infrastructure. That's unusual for week one. Usually the constraint conversation happens in week 3 when ambition collides with the time budget. They did it themselves. Marin ran the session solo from the handbook and didn't have that conversation. Worth doing with him before session 2.\n\nThe design directions are distinct but share a premise: **specificity over decoration.** Ivo's utilitarian data-dense approach, Ivan's deliberately obvious UI, Paula's playful-but-purposeful mobile tool. Marin's visual direction isn't formed yet, but the product premise (real-relationship scenarios, AI conversational partner) is already specific. Four different aesthetics in formation, one underlying principle. These are tools with a point of view.\n\n---\n\n## Individual highlights\n\n**Ivo** — The Dieter Rams reference is doing real work here, not decorative name-dropping. Applying industrial design principles to data visualization is a specific design bet. The risk: \"utilitarian\" can slide into \"gray and joyless.\" Worth watching.\n\n**Ivan** — The insight that existing mockup tools require too much prompt knowledge is the right framing. He's not building an image generator — he's building a *UX layer* on top of one. That distinction will matter a lot in weeks 5–7 when the interface has to do all the work the user isn't doing.\n\n**Paula** — The strongest real-user constraint of the three. A specific teacher, a specific classroom, a Monday morning use case. The AI layer deliberately deferred to week 10 shows good instinct — the interaction design has to work before the AI layer is worth anything.\n\n**Marin** — Ran the session solo from the handbook on the workshop site, at his own desk, and shipped a working prototype in his one self-directed hour. That's implicit proof the curriculum is usable without a facilitator in the room. Personal project with the strongest emotional anchor of the four (long-distance partner). The risk: \"better than Duolingo\" is the easiest claim to over-promise. The honest version is narrower and stronger — Duolingo doesn't have Croatian, and *Naučimo Hrvatski* is built around one real relationship's conversational patterns. Sharpen the framing before session 03.\n\n---\n\n## What worked / What didn't\n\n**Worked:**\n- All four participants arrived with scoped, honest briefs — no hand-holding needed to get to a real project\n- The constraint-naming exercise landed well with the three who started on time; participants named what they weren't building without prompting\n- Strong diversity of project types (data tool, creative tool, productivity tool, language tool) without overlapping problems\n- A solo run of the handbook by Marin produced a working prototype in one hour — implicit proof the curriculum is usable without a facilitator\n\n**Didn't:**\n- Need to watch the week 10 AI layer in Paula's project — easy to over-promise what summaries will do\n- Ivo's \"data-dense\" direction needs an early visual test; dense and readable is a hard target\n- Could have pushed Ivan harder on what a \"bad generation\" fallback actually looks like — deferred to later but worth flagging early\n- Marin missed the scope-naming conversation. The \"Better than Duolingo\" framing also needs sharpening before week 03\n\n---\n\n## Facilitator notes for next week\n\n- Send all four to the research & synthesis exercise with their specific problem, not the general brief\n- Push Ivo toward 5 specific data-dense reference interfaces — not just Garmin clones\n- Ivan should find references for UI that hides complexity well (not AI tools — think hardware, appliances, professional gear)\n- Paula needs to do one observational session with the teacher before week 2 if possible\n- Marin: do the scope-naming pass before session 02. Sharpen the Duolingo comparison to one specific differentiator\n\n---\n\n## Quote of the week\n\n> \"Something that gets used on Monday morning.\"\n> — Paula, on what success looks like\n\n---\n\n## Blog post — draft outline\n\n> *To be developed over 12 weeks. The structure below is a first sketch based on week 1 material. It will change.*\n\n**Working title:** A small team. Real problems. Twelve weeks with AI.\n\n**Angle:** What happens when a small design team decides to build things that actually get used — not concepts, not case studies — using AI as a builder while staying firmly in charge as designers.\n\n**Structure (provisional):**\n1. The brief that changed — how each participant defined their project and why the constraints they set in week 1 were the most important design decision they made\n2. Week by week — the honest account (to be written as sessions progress)\n3. What shipped — description and screenshots of each finished tool\n4. What changed — how each designer's relationship to AI shifted across 12 weeks\n5. The thing that surprised us — one unexpected discovery per participant\n\n**Tone:** Professional, specific, first-person from the participants. No \"AI is amazing\" framing. Real examples, real friction, real outcomes.\n\n**Target publication:** End of week 12. Each participant reviews their section before publishing.\n", "entry": "---\nnum: \"01\"\ntitle: \"Meet Claude. Pick your project.\"\nphase: \"Discover\"\ndate: \"2026-05-08\"\nparticipants: 4\nquote: \"Something that gets used on Monday morning.\"\nquoteAttribution: \"Paula, on what success looks like\"\n---\n\nThree designers showed up. A fourth ran the handbook solo at his own desk and asked to join after. Each came in with a project that already had a real user. Two of them, the designer themselves. Two of them, someone they love.\n\n## The four projects.\n\n**Ivo: Personal Cycling & Training Dashboard.** A web tool that ingests CSV exports from Garmin, power meter, and HR monitor and turns them into power zones, training load, ride history, and trends. Engineering mindset applied to athletic data. Dieter Rams as a stance, not a style.\n\n**Ivan: Mockup Generator.** Upload a graphic, dial in a feeling across six pre-engineered dimensions, get a realistic mockup. Four clicks, one generation, no text fields. The interface does the prompt engineering the user shouldn't have to.\n\n**Paula: Classroom Behavior Tracker.** A mobile-first tool one specific teacher will open during real classes to log behavior across focus, participation, and disruption. AI summaries arrive in session 10. The interaction design has to work first.\n\n**Marin: Naučimo Hrvatski.** A language-learning app for one specific person. His girlfriend, in Philadelphia, learning Croatian for her eventual move to Osijek. Five scenarios mirror the actual FaceTime calls they have. An AI plays a Croatian boyfriend character, replies in Croatian with English in brackets, corrects gently. Not Duolingo. Built around one real relationship.\n\n## What they had in common.\n\nAll four arrived with the same instinct: build for a real problem, not a portfolio brief. No concepts. Each one already knew what success looked like and who it was for.\n\nThree of them independently named what they were not building, and why. No live API integration, no custom model training, no complex backend. Marin ran the session solo so he didn't have the group conversation, which means the scope-naming pass is the first thing we do with him before session 02.\n\nThe aesthetics are different. Ivo's going data-dense, Ivan is deliberately obvious, Paula's building something playful and mobile. Marin's visual direction is still forming. Tools with a point of view.\n\n## Risks we named early.\n\nIvo's \"data-dense\" direction needs an early visual test. Dense and readable is a hard target.\n\nIvan deferred the \"bad generation\" fallback. That's reasonable. It'll quietly become the project in sessions five through seven, when the interface has to do the work the user isn't.\n\nPaula's session-10 AI summary layer is the easiest thing to over-promise. \"Surfaces patterns\" is a high claim. We watch the framing.\n\nMarin's \"better than Duolingo\" framing is the easiest claim to over-promise too. The honest version is narrower and stronger. Duolingo doesn't have Croatian. *Naučimo Hrvatski* is built around one real relationship. That's the project. We sharpen the framing before session 03.\n\n## The facilitator's project, running in parallel.\n\nWhile the participants set their briefs, the facilitator was running a meta-project. This website. The build followed the same steps from the workshop's own curriculum, and produced a first-draft version of the site you're reading. The designers caught the AI-generated copy within seconds, so rewriting it became the priority. Only by v3 and v4 did it stop feeling salesy and sloppy.\n\nIvan's project needed real planning too, so we encouraged him to talk to Seba, our dev who shipped Photato. Photato runs on an image-generation API. Seba walked Ivan through how it's wired, and Ivan came back with a sharper sense of the technical surface. From here on, we'll invite agency experts to join the workshop when a project needs them.\n"}, "2": {"synthesis": "# AI for Designers — Week 02\n## Research & synthesis\n\n**Session:** Week 2 of 12\n**Date:** 13 May 2026\n**Participants present:** 4 (Ivo, Ivan, Marin, Paula)\n**Service interruption:** Claude.ai outages began at minute 10 and continued intermittently through the session ([status incident](https://status.claude.com/incidents/sb7byp4h7yp8)).\n\n---\n\n## The session, in one line\n\nFour ideas came in. Four project briefs went out. One major project pivot. Two scope cuts that will hold for the rest of the program. One participant naming API anxiety out loud.\n\n---\n\n## What each participant produced\n\n### Ivo — Wattlog (project formally named)\n\nAn 11-tool competitive matrix, structured as: does well · distinctive · what not to copy · one technique to borrow. Tools surveyed: intervals.icu, TrainingPeaks, Strava, Garmin Connect, Xert, Wahoo SYSTM, WHOOP, Runalyze, Final Surge, Stryd PowerCenter, Zwift.\n\nThe matrix synthesised into `wattlog-brief.md`: product definition, target user (himself), success criteria, a 16-feature priority list ranked P0 through P3, competitive lessons, and an explicit not-building list with seven items including \"Strava exists.\"\n\nThe wedge the brief identifies: outdoor, self-coached cyclists are underserved by the prescriptive layer. WHOOP does diagnosis-to-prescription for general fitness. TrainingPeaks does it if you're paying a coach. Zwift does it if you're indoors. The outdoors-first, coach-less, prescriptive cycling tool doesn't exist well yet.\n\nThe session closed with Claude challenging the brief across six areas. Ivo's read was that the challenge wasn't relevant to where the project actually is.\n\n**Decision committed to:** 16-feature P0–P3 list, 7-item not-building list, no proprietary vocabulary.\n\n---\n\n### Ivan — Mockup Generator\n\nThe most rigorous iteration in the room. The brief went through three drafts and two full rounds of Claude arguing with its own previous output.\n\nA 10-tool competitive analysis (Pinterest, Mockey.ai, Lummi.ai, Leonardo.ai, Midjourney, Krea.ai, Visual Electric, Cosmos.so, Magnific, Recraft) shaped the input system, refinement pattern, and output experience.\n\nThings that changed across the drafts:\n\n- Tap-to-refine cut from v1, replaced with a lock-and-shuffle pattern (explicit user lock-in rather than inferred convergence).\n- Input hierarchy restructured: Subject and Aesthetic Preset are primary and always visible; the four other dimensions collapse by default.\n- Background removal moved from a post-generation tool to an input option (\"No background\" inside Environment).\n- GPT Image 2 confirmed as the generation API after a live research check. Snapshot pinned at `gpt-image-2-2026-04-21`.\n\n**Decision committed to:** No text inputs in UI, ever. Ivan's own framing: *\"No text inputs in UI because they force me to think and thinking is tiresome.\"*\n\n**Stuck:** API connection. Ivan said it plainly: *\"I'm scared of the API connection.\"* Worth raising with the room.\n\n---\n\n### Marin — Naučimo Hrvatski (reframed mid-session)\n\nThe biggest project shift of the cohort. Marin came in with the FaceTime-style conversation app from session 01. He left with a memory book that teaches Croatian, built around real trips with Kenzie.\n\nThe lever was a research check. Ten indie conversation-based language tools surveyed (TutorLily, Univerbal, Gliglish, Langotalk, TalkBits, AI LingoPlay, Langua, LingoStar, Copycat Cafe, Praktika). Surfaced finding: no app on the market is built around a couple's actual relationship as its core scenario.\n\nOnce that gap was visible, the conversation app from session 01 was the wrong shape. The right shape was a memory book.\n\n**The new structure:** Six chapters mapped to real trips, December 2024 through Kenzie's visit in September 2026. Continuous narrative inside each chapter, not standalone vignettes. Most scenes use \"describe the photo.\" Each chapter closes with a \"story rebuild\" where Kenzie retells the whole trip in Croatian and the AI gently corrects.\n\n**Decision committed to:** Memory book structure. Six chapters. No streaks, no hearts, no guilt notifications.\n\n**Open:** Build chapter 1 fully in v1 versus six chapters partially. Claude recommended one fully. Marin hasn't committed. This is the most consequential open decision in the cohort.\n\n---\n\n### Paula — Classroom Behavior Tracker\n\nCommitted to the project in the first half of the session, then made two scope cuts in the second half that will define the project.\n\n**Scope cut 1:** Students will not use the app directly. The teacher holds the device. The students view a scoreboard. Paula's own line: *\"Students will not be able to use it. Only the teacher, and students will just look at them.\"*\n\n**Scope cut 2:** Negative consequences happen offline. The screen is the reward layer. *\"Bad points would end up in extra homework and such, nothing digital.\"*\n\nResearch output: a 6-tool matrix (ClassDojo, LiveSchool, Lekktura, Bloomz, Be+, Kickboard) and a deeper 10-reference report on character-driven gamification (TeachQuest, ClassMana, Habitica, Prodigy, Blooket, Gimkit, Joon, Finch, Duolingo Leagues, Mrs Wordsmith). Art direction locked: pixel-art, retro, Habitica as starting reference.\n\n**Decision committed to:** Three must-haves. Pixel-art direction. Two scope cuts above.\n\n**Flagged for research:** The psychology of public point displays and leaderboards. Paula wants to verify this before designing any visible ranking. Real research item, not a stalling tactic.\n\n---\n\n## Patterns across the group\n\n**Every brief came out with an explicit not-building list.** That conversation usually happens in session five or six when ambition collides with the time budget. This cohort did it in session two. Whether the lists hold under time pressure is the thing to watch around session 06 or 07.\n\n**Two participants reported \"nothing pushed back at me.\"** Ivo and Paula. The sessions did run cleanly, and both their briefs are good. But the workshop's central skill is the ability to resist AI output, and that muscle doesn't grow if it's never used. Session 03 needs a moment for both of them to argue against their own briefs.\n\n**Two participants engaged in real back-and-forth.** Ivan went through three brief drafts. Marin had a full project reframe driven by a research check. Those two used the session as it was designed.\n\n**API anxiety surfaced.** Ivan named it. Three of the four projects in the room will hit an API at some point (Marin already has Claude Sonnet 4 wired in; Ivan needs GPT Image 2; Paula's session-10 AI summary layer will need something). A group walkthrough belongs in session 04 or 05.\n\n---\n\n## What worked / What didn't\n\n**Worked:**\n\n- All four projects produced written briefs in markdown that the participants can now argue with.\n- Three of the four briefs had at least one decision flip during the session. That's the workshop doing its job.\n- The competitive research format (\"does well · distinctive · what not to copy · one technique to borrow\") produced concrete inputs the briefs actually used.\n- The Claude.ai outages didn't derail the session. The room multitasked, googled, talked through projects, resumed when the API came back.\n\n**Didn't:**\n\n- Two of the four participants didn't engage with Claude's pushback. Different reasons in each case, but the result is the same: a brief that hasn't been resisted is fragile.\n- The end-of-session check-in questions are unpopular. Some participants skipped past the harder ones. Worth cutting one of the five.\n- The outage was an unplanned hour. Hard to attribute exactly, but participants noted starts and stops.\n\n---\n\n## Facilitator notes for next session\n\n- Ask Ivo and Paula to deliberately argue against their own briefs. Pick two items each, force a counter-argument.\n- Push Marin to commit on chapter scope before session 03 ends. Reframe: chapter 1 fully built is a working gift; the rest become drops over time.\n- Help Marin scope what \"enough detail per scene\" actually looks like for trip data ingestion. Without a target it expands forever.\n- Allocate 30 minutes of session 03 or 04 to Paula's PBIS / leaderboard psychology research.\n- Plan a 15-minute group walkthrough of API basics for session 04 or 05. Frame as the boring practical part.\n- Cut one of the five check-in questions. Keep \"best and worst Claude moment.\"\n- Session 03 is moodboards for Ivo and Ivan, philosophy + art direction for Paula, chapter-scope commit and trip-data format for Marin.\n\n---\n\n## Quotes from the session\n\n> *\"It should be a wrapper that converts your inputs into as perfect as possible prompts for the AI.\"*\n> — Ivan, on what the Mockup Generator actually is.\n\n> *\"No text inputs in UI because they force me to think and thinking is tiresome.\"*\n> — Ivan, on why the chips are the prompt.\n\n> *\"Students will not be able to use it. Only the teacher, and students will just look at them.\"*\n> — Paula, locking in the scope cut.\n\n> *\"Bad points would end up in extra homework and such, nothing digital.\"*\n> — Paula, locking in the second scope cut.\n\n> *\"I'm scared of the API connection.\"*\n> — Ivan, plainly. Worth raising with the room.\n\n---\n\n## Blog post outline — update\n\nNo changes to the structure from week 01. The week-02 material strengthens chapter 1 (\"The brief that changed\") since every participant produced a written, scoped brief and three of the four had real iteration on it.\n", "entry": "---\nnum: \"02\"\ntitle: \"Write the brief. Argue with it.\"\nphase: \"Synthesis\"\ndate: \"2026-05-13\"\nparticipants: 4\nquote: \"No text inputs in UI because they force me to think and thinking is tiresome.\"\nquoteAttribution: \"Ivan, on why the chips are the prompt\"\n---\n\nClaude went down ten minutes into the session and kept dropping in and out for the rest of the afternoon. When the API was up we worked the brief. When it was down we talked through the projects and googled references the way we used to. Nobody panicked. The afternoon ended on time.\n\nBy the end of it, every project had a written brief and three of the four had moved in some material way.\n\n## Wattlog, on paper.\n\nIvo's project picked up its name in session 02. The brief came in three pieces: a competitive matrix across eleven training tools, a sixteen-feature priority list ranked P0 through P3, and a not-building list that opens with \"Strava exists\" before ruling out coaching software, video workouts, route planners, and four other things Wattlog could be mistaken for. The brief didn't change Ivo's direction. It got the direction onto paper, where it can be argued with, which is the only thing a brief is really for.\n\nThe shape of the project is settled. The visual side isn't. That's session 03's problem.\n\n## The Mockup Generator, in three drafts.\n\nThe brief went through three drafts inside the two hours of session 02. Ivan kept asking Claude to argue with what it had just produced. Twice it did, persuasively. Tap-to-refine got cut from v1 and replaced with a lock-and-shuffle pattern. The input hierarchy was restructured so two dimensions are primary and four collapse by default. Background removal moved from a post-generation tool into one of the choices inside Environment. GPT Image 2 was confirmed as the generation API after Ivan asked Claude to check the current state of the field in real time.\n\nThe product Ivan is building is a wrapper that turns six visual choices into a prompt the user never has to write. The quote at the top of this entry is the line he picked to describe his own design rule.\n\nHe also said, near the end of the session, that he's scared of the API connection. He isn't the only one in that boat. The Mockup Generator runs on GPT Image 2. Marin's app already calls Claude Sonnet 4. Paula's tracker will want an AI summary layer eventually. The people building these aren't engineers. The work of making API plumbing feel ordinary is going to be its own small thread across the next few sessions.\n\n## Naučimo Hrvatski, reframed.\n\nMarin came into session 02 with the FaceTime-style conversation app he'd built in session 01. He left with a completely different project.\n\nThe shift came from a research check. Ten conversation-based language apps surveyed, and none of them are built around a couple's actual relationship. Once that gap was visible, the FaceTime app stopped being the right shape.\n\nThe new project is *Naučimo Hrvatski* as a memory book. Six chapters mapped to real trips Marin and Kenzie have taken, December 2024 through her next visit in September 2026. Each chapter opens at the airport. Each scene inside is a day or a moment from the trip: Marin's grandma's house, the walk by the Drava, New Year's in Rome. To turn a page, Kenzie has to do something in Croatian. Describe a photo. Fill in a sentence she would have said at the time. Retell the day. The chapter closes with her retelling the whole trip in Croatian, the AI gently correcting, and the retelling saved into the book as her own version of the story.\n\nThe decision Marin still has to make is how many chapters to ship by week 12. Claude's recommendation is one chapter fully built, handed over as a working gift, then more chapters drop in over time. The alternative is six chapters half-built by the end of the program, which is a deck. He hasn't picked yet.\n\n## The Classroom Behavior Tracker, narrowed.\n\nPaula spent the first half of the session moving between project ideas. She spent the second half committing. The Classroom Behavior Tracker is now a teacher-only tool, built in Claude Code, for one specific teacher Paula knows.\n\nThe two scope cuts she made in the same hour will shape everything downstream. Students never interact with the app. They only see a projected scoreboard. Negative consequences happen offline, not on the screen. The screen is the reward layer. Punishment lives in real life.\n\nThe aesthetic is pixel-art and gamified. Habitica is the starting reference, with Duolingo's tiered leagues borrowed for the leaderboard pattern. Before any visible ranking gets designed, Paula wants to read the PBIS literature on public point displays. The psychology side of \"who can see whose score\" is going to shape what the student view actually becomes, and that's worth thinking through before the pixels start moving.\n\n## The session, looking back.\n\nThree of the four projects moved materially. Ivan's brief through three drafts. Marin's whole concept reframed by one research check. Paula's two scope cuts. Ivo's project picked up a name and eight items on the not-building list. Nobody walked out with the same project they walked in with, except possibly Ivo, whose project was already converged before the day started.\n\nThe outage was the day's quiet character. It came back enough times to be a presence, and not enough times to be a disaster. We worked around it. That's probably the most useful thing we practiced today.\n\n## Between sessions, the plan got rewritten.\n\nAfter two sessions we had enough real participant work to see what the program actually needs versus what we'd assumed at the planning stage. Between session 02 and session 03, the facilitator did a full revision pass on the workshop plan.\n\nSome sessions changed. Some topics shifted. Parts that had felt necessary on paper but weren't earning their place in the room came out. The remaining sessions are tighter, with more room for participants to plan ahead, test, and review work properly.\n\nThe prompts got rewritten. Each session now has its own set that match what the session is actually asking participants to do, rather than the generic versions the plan started with. A new pre-prompt challenge called *Think Before You Prompt* sits at the top of every session. It frames how to talk to Claude before opening the chat.\n\nEach session now also names the Claude model and mode it expects. We're running every session in its own chat, so picking the right Claude for the work matters.\n\nThe journal got a redesign. A contents side panel makes the entries easier to navigate as more land. The voice the AI uses to draft entries got tightened too, so the posts capture what the session was actually like instead of reading as polished but empty.\n\nThe facilitator also moved his own work into Claude Cowork to see how the desktop-agent version handles more complex agentic tasks. The personal-Jarvis test, with the workshop as the workload.\n"}, "3": {"synthesis": "# AI for Designers — Week 03\n## Set the visual direction\n\n**Session:** Week 3 of 12\n**Date:** 20 May 2026\n**Participants present:** 4 (Ivo, Ivan, Marin, Paula)\n\n---\n\n## The session, in one line\n\nAll three projects that ran the visual direction process got briefs. None of the designers were satisfied with the first-pass output. Two of them kept going and found something more interesting than a resolved brief.\n\n---\n\n## What each participant produced\n\n### Ivo — Wattlog (visual direction + brief rewrite)\n\nIvo arrived with the most thorough brief in the cohort. Every component specified. ASCII layout diagrams. Exact values for color, weight, spacing, and radius. It produced a dashboard he didn't like.\n\n**Session work:** Two dashboard iterations. First was too flat — everything at the same visual weight. Second pushed hierarchy harder: TSB at 64px in accent orange, prescription unboxed as a statement, secondary metrics in a hairline ruled strip. The original brief was written and committed.\n\n**Post-session work (same day):** Ivo identified the brief as the wrong shape. It was a specification — what to build — rather than a constraint system — what not to. We audited the dashboard together and found 19 AI tells, including the most revealing one: a rationale strip at the bottom explaining why the design was unconventional. Design that defends itself is already failing.\n\n**New approach:** Started with cultural anchors (Dieter Rams, Nothing OS), built a testbed widget first (320×420px), and derived the constraints from that. Helvetica Neue instead of Inter. No `font-weight: 300`. No pill badges. No upward delta arrows. TSB at 104px as a typographic object sitting on the page with no card around it. Orange used three times across the whole screen.\n\nThe new brief's opening line is its thesis: *a style guide tells you what something looks like; a constraint system tells you what it can never be.*\n\n**Both briefs are in the repo.** The contrast between them is the actual artefact from this session.\n\n**Decision committed to:** New visual brief, Dieter Rams + Nothing OS as cultural anchors, dashboard rewritten from widget up.\n\n**Still open:** Side-by-side build comparison between old brief and new brief hasn't happened yet. The case for the new one is convincing but untested against actual output.\n\n---\n\n### Ivan — Mockup Generator\n\nIvan's session check-in wasn't submitted for week 03. No update.\n\n---\n\n### Marin — Naučimo Hrvatski (visual direction locked)\n\nThree visual directions generated: Memory Press, Tender Thread, Adriatic Dusk. Selected Adriatic Dusk. Two mockup rounds, type system locked, first scene screen built.\n\nThe scene: Scena 3 · Sarma kod bake. Glassmorphic, full-bleed warm amber background, Playfair Display italic at display scale, frosted glass narration card, Marko pill, word hint chips, Nastavi at the bottom. Narration card line: *\"Bakina kuhinja miriše na nedjelju, na dim i na sarmu.\"*\n\nFriction point: Claude kept defaulting away from DM Sans for the UI layer even after it was defined. Took a direct correction and a round of uploaded references to hold it.\n\nMarin was the most satisfied participant at end of session. Direction is locked. Type system is documented. Banned moves list is 15 items.\n\n**What's next:** Feeding Claude actual trip content — photos, stories, context. That writing work hasn't started. The scenes can't be specific until it has.\n\n**Decision committed to:** Glassmorphic Emotional direction, Playfair Display italic + DM Sans system, full design brief in both `.docx` and `.md`.\n\n**Quote worth keeping:** *\"Bakina kuhinja miriše na nedjelju, na dim i na sarmu.\"* — from the scene card. That's the project working.\n\n---\n\n### Paula — ClassArcade (visual direction + style guide rewrite)\n\nThree HTML prototype iterations during the session. Dark scanline version rejected immediately. Subsequent iterations arrived at warm cream ground, Nunito, pink/blue/orange ranking colors. 13-item banned moves list. Scope committed: student list and top-3 leaderboard, nothing else yet.\n\n**Post-session finding:** Three sessions of refining the prompt kept producing the same dashboard. Saturated mint and purple. Rounded Nunito. Emoji avatars. The brief was followed. The output was generic.\n\n**Root cause diagnosed:** The reference images. Two children's app screenshots uploaded at the start had set the aesthetic ceiling for every subsequent prompt. Words couldn't override them. The model weighted the references more than the brief.\n\n**What broke the cycle:** Changing the references. Swapped saturated mascot-blob UI for editorial kids references (Fraunces italic headlines, white-dominant, abstract scattered shapes). Same target audience, opposite visual language. The first build with new references was the first one that didn't look like the others.\n\n**Second finding:** Anti-pattern lists are dangerous as a primary tool. \"Don't use mint, don't use thick rings\" reads as confirmation that the aesthetic is in scope. Retirement-with-replacement works better: name what goes in the slot instead of what doesn't.\n\n**Third finding:** Side-by-side comparison is the highest-bandwidth feedback. \"This is too generic\" produced polite agreement and another generic result. Pasting both versions and asking for specific differences produced a concrete analysis. The prompt was: *\"Compare the differences and write down the findings.\"*\n\nStyle guide fully rewritten with all three lessons incorporated. It opens with a diagnosis of why the first guide failed. Every retired element has a named replacement. Closes with a yes-or-no build checklist.\n\n**Decision committed to:** New reference set, revised style guide, Fraunces + Plus Jakarta Sans, white-dominant with color as accent.\n\n**Still stuck:** Characters still undefined. The two reference images replaced earlier ones, but the character system hasn't been decided.\n\n---\n\n## Patterns across the group\n\n**References override words — every time.** This was the single clearest finding from the session. Ivo's thorough specification and Paula's detailed brief both lost to whatever aesthetic the model associated with the project context. The way out was changing the references or establishing a new cultural anchor before any generation happened. Both designers arrived at the same conclusion from different directions.\n\n**Specification vs. constraint system.** Ivo's post-session rewrite made this explicit. A specification tells the model what to produce. A constraint system closes off the default options and forces a different search. The new Wattlog brief is mostly refusals. The new ClassArcade style guide has explicit retirements with named replacements. Both are more effective than their predecessors.\n\n**Anti-pattern lists are risky.** Paula discovered that describing what not to do confirmed the aesthetic was in scope. The model anchored to the world being described, not the negation. This applies to the \"banned moves\" framing across all briefs — worth revisiting whether those lists are helping or reinforcing defaults.\n\n**Comparison prompts outperform critique prompts.** \"This is too generic\" → generic result again. \"Compare these two images and name the specific differences\" → actionable analysis. The model's analytical output is better than its self-critique. Useful technique for any session where output is stuck.\n\n**Marin had the cleanest session.** He came in with a real art direction reference (glassmorphic, Mediterranean warmth, Playfair italic) and it translated well. The difference between his session and Ivo's and Paula's wasn't skill — it was that he had a specific, unusual visual reference that the model didn't have a direct shortcut to.\n\n---\n\n## What worked / What didn't\n\n**Worked:**\n\n- Auditing the existing output for AI tells before rewriting the brief. Finding 19 specific tells gave Ivo a concrete target rather than a vague sense that something was wrong.\n- Starting with a small testbed component (the 320×420 widget) before scaling to the full dashboard.\n- Changing the reference images rather than the brief text when output was stuck.\n- Side-by-side comparison as a feedback mechanism.\n- Marin's direct approach: pick one direction, commit fast, iterate.\n\n**Didn't:**\n\n- Banned-moves lists as a primary framing tool. Probably should be secondary — after a positive constraint system is established.\n- First-round Claude output across all three projects. The default aesthetic surfaced in everything. Participants had to fight for every departure.\n- The brief-first approach for Ivo. Starting from a full specification meant all the iteration happened downstream rather than at the constraint level.\n\n---\n\n## Facilitator notes for next session\n\n- Ivo: Run the side-by-side build test between old brief and new brief. That's the thing to validate.\n- Paula: Characters still undefined — this is a blocker for the avatar system. Needs a decision before the next build.\n- Marin: Content handoff is the next task. Needs a working method for turning trip notes and photos into scene descriptions Claude can use. Help him scope this before he tries to do all six chapters at once.\n- Ivan: No check-in this week. Reconnect at the start of session 04.\n- For the group: the \"compare the differences\" prompt technique is worth sharing explicitly. It's the most transferable finding from the week.\n- Consider whether banned-moves framing across all briefs is working. The ClassArcade experience suggests it may be reinforcing the wrong reference space.\n\n---\n\n## Quotes from the session\n\n> *\"Design that has to announce its own unconventionality is admitting it isn't.\"*\n> — Working conclusion from the Wattlog audit.\n\n> *\"A style guide tells you what something looks like. A constraint system tells you what it can never be.\"*\n> — Closing line of the new Wattlog brief.\n\n> *\"Compare the differences and write down the findings.\"*\n> — The prompt that broke the ClassArcade cycle.\n\n> *\"Bakina kuhinja miriše na nedjelju, na dim i na sarmu.\"*\n> — From Marin's first scene card. The project working.\n\n> *\"I'm happy as long as the app works and performs well.\"*\n> — Marin, at the end of the session.\n", "entry": "---\nnum: \"03\"\ntitle: \"Set the visual direction. Fight Claude's taste.\"\nphase: \"Design\"\ndate: \"2026-05-20\"\nparticipants: 4\nquote: \"I'm happy as long as the app works and performs well.\"\nquoteAttribution: \"Marin, who thought the look mattered less than the product working\"\n---\n\nBy the end of it, every project had a brief and a visual direction they could defend. None of the three designers were fully satisfied with what they'd made. That gap between \"brief\" and \"proud of it\" was the session's real subject.\n\nThe iteration pattern was the same across all three projects. Claude produced three initial directions. The designers rejected what felt like defaults, went to Pinterest, found things they actually liked, and brought those references back in. The second and third passes were better. None of them quite escaped Claude's own aesthetic.\n\nThree design briefs shipped. The question that surfaced in every project, in different words, was the same one: how do you make this look like it wasn't made by AI?\n\n## Naučimo Hrvatski, scene by scene.\n\nMarin generated three directions: Memory Press, Tender Thread, Adriatic Dusk. He picked the third. Two rounds of mockups later, a type system locked, and the first real scene screen built: Scena 3 · Sarma kod bake. Full-bleed warm amber background. Playfair Display italic at display scale. A frosted glass narration card. The line on the card: *Bakina kuhinja miriše na nedjelju, na dim i na sarmu.* That sentence is the project working as intended. One specific kitchen, one specific memory.\n\nThe friction through the session was the typeface. Claude kept defaulting away from DM Sans for the UI layer, even after the brief defined it explicitly. It took a direct correction and a round of uploaded references to hold the line. By the end, the direction was settled and Marin was the most satisfied person in the room.\n\n## Wattlog, rewritten from the brief up.\n\nIvo arrived with a thorough brief already written. It produced a dashboard he didn't like. The brief described the desired look in detail: palette, type scale, component specs. The output followed those specs and still felt generic. Warm color, clean type, nice hierarchy, completely forgettable.\n\nThe rewrite changed the approach. Instead of describing what the dashboard should look like, the new brief defined what it couldn't be. Specific type pairing instead of a single safe typeface. Color restricted to a strict signal role: orange, twice, for one reason each. Layout as a ruled ledger, not cards. Charts drawn directly in canvas, not from a library. Each of those instructions blocks a default the model would otherwise reach for. The result looked different not because the palette changed, but because the structural logic changed.\n\n## ClassArcade, three sessions and a rewrite.\n\nPaula's session produced three HTML prototype iterations. The first version: dark background, pixel font, scanline overlay. Rejected immediately. The second and third moved toward warm cream ground, Nunito, vibrant pink and blue and orange for the ranking colors. A 13-item banned moves list written into the brief. Paula committed to scope: a student list and a top-3 leaderboard.\n\nThen the session continued past the brief.\n\nThree more build attempts kept producing the same dashboard. Rounded Nunito everything. Saturated cards. Emoji avatars with thick rings. The brief was being followed. The output was still generic. Adding more bans made it worse. Listing what to avoid confirmed those patterns were in scope.\n\nTwo things changed in the session that broke it: the reference images and the brief. Two children's-app screenshots from early on had set the visual register for everything that followed. Swapping them for editorial references (a kids site with Fraunces italic headlines, white ground, type-led hierarchy) produced a different output on the first attempt. The new brief changed what it was allowed to produce.\n\nThe other technique that worked: side-by-side comparison. Telling the model \"this is too generic\" got polite agreement and another generic result. Pasting both outputs and asking it to name the specific differences produced an analysis specific enough to act on. Four words: *\"Compare the differences and write down the findings.\"*\n\n## After the session, what worked and why.\n\nThe improved designs weren't better because the briefs were more detailed. They were more restrictive in the right places.\n\nA prompt that behaves like a mood board gives the model room to fill the gaps with whatever is statistically common. A prompt that behaves like a design system closes those gaps before the model reaches for defaults.\n\nWhat that looks like in practice: start with the product job, not the aesthetic. Define a governing idea specific enough that it can't be averaged: \"Braun hardware logic,\" not \"clean and playful.\" Then set hard constraints on typeface, color roles, layout patterns, and component structure. Then name the AI defaults you're blocking, and give a replacement for each one. A bare ban describes a problem. A replacement gives the model something to do instead. A checklist at the end makes regression visible: is Fraunces italic loaded? Are XP numbers in the right weight? Does the headline mix both fonts?\n\nThat structure produced a different class of output. Product job, governing idea, hard constraints, blacklist with replacements, checklist.\n\n## The session, looking back.\n\nAll three projects closed with a brief. Marin's was the one he wanted. Ivo's and Paula's led somewhere less expected. The question turned into more work, and the work held up.\n\nMarin locked his direction in 45 minutes. He was the only one who didn't spend the session fighting the aesthetic. His read: if the product works, the look is secondary. \"I'm happy as long as the app works and performs well.\"\n"}, "4": {"entry": ""}, "5": {"entry": ""}, "6": {"entry": ""}, "7": {"entry": ""}, "8": {"entry": ""}, "9": {"entry": ""}, "10": {"entry": ""}, "11": {"entry": ""}, "12": {"entry": ""}}, "caseStudies": {"ivo": "---\nparticipant: \"Ivo\"\nproject: \"Wattlog\"\nstatus: \"draft\"\nweeks_completed: 2\nlast_updated: \"2026-05-13\"\nhero_image: \"\"\nfinal_url: \"\"\n---\n\n# Wattlog\n\n> First-person case study — Ivo's voice. Built across 12 weeks. Reviewed by Ivo before publication.\n\n## TL;DR\n\nA single-purpose web tool I actually use to train smarter. Called Wattlog. .fit files from Garmin and the smart trainer go in. Power zones, training load, ride history, and trends come out. No live API. No portfolio gloss. Dieter Rams applied to athletic data.\n\n---\n\n## The brief\n\n*To fill in from week 1 → 2 sessions. Keep this section short — two paragraphs max. The point of view, the user (me), the constraint that mattered.*\n\nI wanted a training tool that didn't waste my time. The market is two extremes: pro-athlete software with steep learning curves, and consumer apps that gamify everything I want left alone. I'm an engineer by training and a cyclist by hobby, and I wanted the in-between thing — clean, dense, no decoration.\n\n## The constraint that mattered most\n\n**No live API integration.** Garmin Connect lets you export CSV. That's enough. Skipping the integration tier kept my weekly hour budget on what matters — design and insight — instead of plumbing. Anyone using this would export once a week, paste in, get the read.\n\n## The reference move\n\nDieter Rams. Specifically, the calculator and the radio. Not \"minimal\" as a style — minimal as a stance about what data deserves visual weight.\n\n*Add 3 reference images here in week 5–6 (data-dense interfaces, not Garmin clones).*\n\n## Week-by-week\n\n### Week 01 — The brief\n\nCame in with a project I already half-knew I wanted. The intake interview surfaced what I hadn't named: the design bet is *visual density that stays readable.* That's a hard target. \"Utilitarian\" can slide into \"gray and joyless\" if you don't watch it.\n\n*One screenshot of the brief / first sketch.*\n\n### Week 02 — Wrote it down.\n\nThe session was research and synthesis. I went through eleven training tools in a matrix and wrote a full project brief for Wattlog. Sixteen features ranked P0 through P3. Seven items on the not-building list, including \"Strava exists.\"\n\nWhat I learned from the matrix: intervals.icu is the closest analytical product to what I want, and it gets the depth right but presents it like a Bloomberg terminal. WHOOP nailed the diagnosis-to-prescription handoff for general fitness. Nobody does that prescriptive layer well for outdoor self-coached cyclists. That's the wedge.\n\nThe session closed with Claude pushing back on the brief across six areas. Honestly, the pushback wasn't very useful — I came in with most of this already worked out, and the session structured it rather than changed the direction. That's fine. The brief on paper is what mattered.\n\n*Screenshot: the 11-tool competitive matrix.*\n*Screenshot: the P0–P3 feature ranking.*\n\n### Week 03 — The brief was the wrong shape.\n\nThe session was visual direction. Two dashboard iterations in the room: the first too flat, everything at the same weight; the second better after one hard note — \"more hierarchy.\" TSB promoted to 64px in accent orange. Prescription text unboxed as a statement. Secondary metrics collapsed to a ruled hairline strip. The brief got written: warm off-white ground, single accent color, two type weights (400 and 500 only), 0.5px borders, no shadows. Art direction committed.\n\nBut I didn't like the result.\n\nMy original brief was thorough. Every component specified. ASCII layout diagrams. Exact values for color, weight, spacing, and radius. It produced exactly what I specified, and what I specified turned out to be the wrong thing. So the session kept going.\n\nWe started the post-session audit with two reference interfaces: the Framer Dieter Rams remix page and the Nothing OS widget grid. Both extreme constraint systems. Both legible because of what they remove. Then we read the dashboard my first brief had produced — not to tweak it, but to find everything wrong with it. Six AI tells on first pass. Nineteen by the time we'd read the file carefully. `letter-spacing: 0.2em` on every label. `font-weight: 300` used decoratively. A rationale strip at the bottom explaining why the design was unconventional. That last one became the finding of the day. Design that has to announce its own unconventionality is admitting it isn't.\n\nThen we built something small first — a 320×420 compact fitness widget — and used it as a testbed for the constraints we actually wanted. Helvetica Neue instead of Inter. Two weights, 600 and 400. No 300. A near-black base with a single off-white card. Braun orange at full saturation or not at all, no rgba variants. One dial with spherical shading pulled from the Rams references. A seven-day history rendered as dot-matrix cells. No pill badges. No delta arrows. No tooltip on hover. By the fifth round the banned list was longer than the specification. The widget that came out was the cleanest thing we'd built.\n\nWe scaled it up to the full dashboard with the same constraints applied. TSB rendered at 104px as a typographic object sitting on the page with no card around it. A ruled metric strip with no card backgrounds. A PMC chart hand-drawn in canvas, no chart library, no axis box. Orange used three times across the whole screen.\n\nThe new brief is a constraint system, not a specification. It opens with a cultural anchor — Dieter Rams and Nothing OS — and the specifications exist mostly as refusals. No Inter. No tinted accent variants. No three-column stat grid. No pill badges. No `font-weight: 300`. The closing line: *a style guide tells you what something looks like; a constraint system tells you what it can never be.*\n\nBoth briefs are in the repo. The contrast between them is the actual artefact.\n\n*Screenshot: the second-iteration dashboard from the session — tabbed nav, \"Productive.\" at large weight, CTL/ATL/TSB in a clean three-column strip, PMC chart with a RACE marker.*\n*Screenshot: the widget testbed — Helvetica Neue, dot-matrix history, Braun orange once.*\n\n### Week 04 — _to come_\n\n*…through Week 12.*\n\n---\n\n## What I built\n\n*Screenshots of the finished tool. Three to five images covering: the home view, a detail view, a state I'm proud of, the export-paste flow.*\n\n## What I changed about how I work\n\n*To fill in week 11–12. Real specifics — what I do differently on a Tuesday now.*\n\n## What's still wrong with it\n\n*Three things, honestly. Designers respect this section.*\n\n1.\n2.\n3.\n\n## What I'd do next\n\n*One paragraph. Not a feature list — a direction.*\n\n---\n\n## Credits\n\nBuilt during the AI for Designers 12-week program, run by Marko Kolić at Prototyp.\n", "ivan": "---\nparticipant: \"Ivan\"\nproject: \"Mockup Generator\"\nstatus: \"draft\"\nweeks_completed: 2\nlast_updated: \"2026-05-13\"\nhero_image: \"\"\nfinal_url: \"\"\n---\n\n# Mockup Generator\n\n> First-person case study — Ivan's voice. Built across 12 weeks. Reviewed by Ivan before publication.\n\n## TL;DR\n\nA tool I built because I was tired of spending 20 minutes prompting an AI to mock up a t-shirt I designed. You upload a graphic. You make four choices. You get a realistic mockup. The interface does the prompting for you.\n\n---\n\n## The brief\n\n*Two paragraphs. The frustration, the opportunity, the framing.*\n\nThe honest version: every existing mockup tool either takes too long, looks generic, or asks me to be a prompt engineer. I'm a designer. I want to upload a logo, dial in a feeling, and get something usable in 30 seconds. So I built that.\n\nThis isn't an image generator. It's a *UX layer* on top of one. That distinction is the whole project.\n\n## The constraint that mattered most\n\n**No custom model training.** Generation runs on existing image gen APIs (Flux or Ideogram) with pre-engineered style presets handling aesthetic consistency. Graceful fallback for bad generations. The interface does the work that prompt engineering would otherwise do.\n\n## The reference move\n\nHardware, not software. Professional gear. Things that hide complexity behind a few well-shaped controls — a mixing console, a Leica, a Vitsœ shelving system. Not other AI tools.\n\n*Add 3 reference images here in week 5–6.*\n\n## Week-by-week\n\n### Week 01 — The brief\n\nThe framing landed in the first session. Six input dimensions (subject, aesthetic preset, framing, lighting, environment, era/texture) combine into pre-engineered prompts under the hood. The user never sees a text field.\n\nThe risk Marko flagged: \"bad generation fallback.\" Easy to defer; worth designing early.\n\n*One screenshot of the brief / first sketch.*\n\n### Week 02 — Three drafts, two arguments, one brief.\n\nThis session got the most pushback of any I've had so far, and most of it was Claude arguing with its own previous draft. The brief went through three versions. Two full rounds where Claude looked at what it just produced and said \"this is wrong, here's why.\"\n\nThings that changed across the drafts:\n\n- Tap-to-refine got cut from v1 and replaced with a lock-and-shuffle pattern. Lock the chips that worked, shuffle the ones that didn't, regenerate. Explicit, not inferred.\n- The input hierarchy got restructured. Subject and Aesthetic Preset are now primary and always visible. The other four dimensions collapse by default. If you only touch the two primary ones, you still get a good result.\n- Background removal moved from a post-generation tool to an input option. \"No background\" is now just one of the choices inside Environment.\n\nI also ran a research check on the API. GPT Image 2 is confirmed: 16 reference images per call, native 2K output, photorealism that handles lighting properly, both `images.generate` and `images.edit` endpoints. Brother it should be a wrapper that converts your inputs into as perfect as possible prompts for the AI.\n\nThe one thing I committed to and want on the record: no text inputs in UI because they force me to think and thinking is tiresome.\n\nWhat's stuck: I'm scared of the API connection. Marko knows. We're doing a group walkthrough in session 04 or 05.\n\n*Screenshot: the 10-tool competitive matrix.*\n*Screenshot: the final brief with the lock-and-shuffle pattern sketched.*\n\n### Week 03 — _to come_\n\n*…through Week 12.*\n\n---\n\n## What I built\n\n*Screenshots of the finished tool. Three to five images covering: the empty state, the four-control panel, a generation in progress, a finished mockup, the fallback flow.*\n\n## What I changed about how I work\n\n*To fill in week 11–12.*\n\n## What's still wrong with it\n\n*Three things, minimum.*\n\n1.\n2.\n3.\n\n## What I'd do next\n\n*One paragraph. Direction, not features.*\n\n---\n\n## Credits\n\nBuilt during the AI for Designers 12-week program, run by Marko Kolić at Prototyp.\n", "paula": "---\nparticipant: \"Paula\"\nproject: \"Classroom Behavior Tracker\"\nstatus: \"draft\"\nweeks_completed: 2\nlast_updated: \"2026-05-13\"\nhero_image: \"\"\nfinal_url: \"\"\n---\n\n# Classroom Behavior Tracker\n\n> First-person case study — Paula's voice. Built across 12 weeks. Reviewed by Paula before publication.\n\n## TL;DR\n\nA teacher-operated classroom tool a real teacher opens during a real class to log positive behavior points fast. The teacher holds the device. The students see a pixel-art scoreboard on a projector — leaderboards, XP, characters they can unlock. Negative consequences happen offline, not on the screen. Built in Claude Code. Built around one specific teacher I know, not a hypothetical persona.\n\n---\n\n## The brief\n\n*Two paragraphs.*\n\nI built this for a specific teacher I know. Not a research persona — a person who told me, in detail, what gets in the way during a Monday morning. The whole project lives or dies on whether she opens it during a real class.\n\nThe product takes seconds to use. Tap a student's tile, log a behavior point in one of three categories. End of week, you get a read on patterns you'd otherwise miss because you were teaching.\n\n## The constraint that mattered most\n\n**No backend or user accounts in week one.** Data lives in session or local storage. The AI summary layer comes in week 10, not week 1. The interaction design has to work before any of the smart stuff is worth anything.\n\n## The reference move\n\nThings teachers already trust. The pen. The clipboard. The seating chart. Not productivity apps.\n\n*Add 3 reference images here in week 5–6.*\n\n## Week-by-week\n\n### Week 01 — The brief\n\nThe strongest real-user constraint of the three projects: a specific teacher, a specific classroom, a Monday morning use case. Deferring the AI layer was an instinct call — and the right one. The interaction design has to earn the AI, not the other way around.\n\n*One screenshot of the brief / first sketch.*\n\n### Week 02 — Committed, and made two cuts.\n\nThe first half of the session I was still moving between project ideas. The second half I committed: Classroom Behavior Tracker, built in Claude Code, for one specific teacher I know. Not \"teachers in general.\"\n\nThen I made two scope cuts in the same session that I think will end up being the most important design decisions I make on this thing.\n\n**Students will not use the app.** Only the teacher. The students just look at it. The teacher holds the device, taps points, manages the room. The student view is a scoreboard projected on a screen, not an app on a phone.\n\n**Bad points end up offline.** Negative consequences go to extra homework or a real conversation, not to a public display on the screen. The screen is the reward layer. Punishment lives in real life.\n\nThe research was two artifacts. A 6-tool matrix of the direct competitors — ClassDojo, LiveSchool, Lekktura, Bloomz, Be+, Kickboard — with a \"one technique to borrow\" column. And a deeper 10-reference report on character-driven gamification: TeachQuest, ClassMana, Habitica, Prodigy, Blooket, Gimkit, Joon, Finch, Duolingo Leagues, Mrs Wordsmith.\n\nWhat I took from it: the best student-facing gamification doesn't live in classroom tools. It lives in habit trackers (Habitica), self-care pets (Finch), and chore apps (Joon). I'm going pixel-art, retro, gamified. Habitica is the starting reference. Duolingo's tiered leagues adapt cleanly to a small class.\n\nWhat I want to research before I lock in any visible leaderboard: the psychology of public point displays. PBIS literature on what does and doesn't harm kids when their behavior is visible to the class. I'd love to spend real time on that in session 03 or 04.\n\n*Screenshot: the 6-tool comparison matrix.*\n*Screenshot: the Habitica avatar / profile reference.*\n\n### Week 03 — Three sessions to find the right reference images.\n\nThe session produced three HTML prototype iterations. The first — dark background, pixel font, scanline overlay — rejected immediately. The second and third arrived at the actual direction: warm cream ground, Nunito, vibrant
